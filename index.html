const useDisplayMode = () => {
  const getMode = () => {
    try {
      if (window.matchMedia('(display-mode: standalone)').matches) return 'mobile';
      if (window.navigator.standalone === true) return 'mobile';
      if (window.innerWidth <= 768) return 'mobile';
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) return 'mobile';
    } catch (e) {}
    return 'desktop';
  };
  const [mode, setMode] = useState('desktop');
  useEffect(() => {
    setMode(getMode());
    const handleResize = () => setMode(getMode());
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);
  return mode;
};

const useSwipe = ({ onSwipeLeft, onSwipeRight, enabled = true }) => {
  const touchStartX = useRef(0);
  const touchStartY = useRef(0);
  const handleTouchStart = useCallback((e) => {
    if (!enabled) return;
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
  }, [enabled]);
  const handleTouchEnd = useCallback((e) => {
    if (!enabled) return;
    const deltaX = e.changedTouches[0].clientX - touchStartX.current;
    const deltaY = e.changedTouches[0].clientY - touchStartY.current;
    if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
      if (deltaX > 0 && onSwipeRight) onSwipeRight();
      else if (deltaX < 0 && onSwipeLeft) onSwipeLeft();
    }
  }, [enabled, onSwipeLeft, onSwipeRight]);
  return { handlers: { onTouchStart: handleTouchStart, onTouchEnd: handleTouchEnd } };
};

const normalizeStampValue = (providerId, rawInput) => {
  const provider = STAMP_PROVIDERS.find(p => p.id === providerId);
  if (!provider) return rawInput.trim();
  let val = rawInput.trim();
  if (provider.prefix && val.startsWith(provider.prefix)) val = val.slice(provider.prefix.length).trim();
  return val;
};

const formatStampDisplay = (providerId, storedValue) => {
  if (!storedValue) return storedValue;
  const provider = STAMP_PROVIDERS.find(p => p.id === providerId);
  if (!provider || !provider.prefix) return storedValue;
  if (providerId === 'linkedin') return storedValue.replace(/^\/in\//, '');
  if (storedValue.startsWith(provider.prefix)) return storedValue;
  return provider.prefix + storedValue;
};

// Extract username from OAuth identity data
const getOAuthUsername = (identity) => {
  if (!identity) return null;
  const meta = identity.identity_data || {};
  // Twitter/X: preferred_username or user_name
  if (identity.provider === 'twitter' || identity.provider === 'x') return meta.preferred_username || meta.user_name || meta.name || null;
  // GitHub: preferred_username or user_name
  if (identity.provider === 'github') return meta.preferred_username || meta.user_name || null;
  // Google: email
  if (identity.provider === 'google') return meta.email || null;
  // Apple: email (Apple hides real email behind relay)
  if (identity.provider === 'apple') return meta.email || null;
  return meta.preferred_username || meta.name || meta.email || null;
};

    if (!user) return;
    const { error } = await supabase.from('profiles').update({ display_name: name, updated_at: new Date().toISOString() }).eq('id', user.id);
    if (!error) setProfile(p => p ? { ...p, display_name: name } : p);
  };

  const updateEntityType = async (entityType) => {
    if (!user) return;
    const { error } = await supabase.from('profiles').update({ entity_type: entityType, updated_at: new Date().toISOString() }).eq('id', user.id);
    if (!error) setProfile(p => p ? { ...p, entity_type: entityType } : p);
  };

  const updateProfileSummary = async (assessCompleted, userClaims, entityType) => {
    if (!user) return;
    const summary = {
      assessment_count: Object.keys(assessCompleted || {}).length,
      stamp_count: (userClaims || claims).filter(c => c.visibility === 'public').length,
      entity_type: entityType || 'human',
      updated_at: new Date().toISOString()
    };
    await supabase.from('profiles').update({ profile_summary: summary, updated_at: new Date().toISOString() }).eq('id', user.id);
  };

  // --- Claims functions ---
  const loadClaims = async (userId) => {
    try {
      const { data, error } = await supabase.from('claims').select('*').eq('user_id', userId).order('created_at', { ascending: true });
      if (error) { console.error('[Aura] Claims load failed:', error); return []; }
      return data || [];
    } catch (err) { console.warn('[Aura] Claims load error:', err.message); return []; }
  };

  const createEmailClaim = async (userId, email) => {
    const normalized = email.toLowerCase().trim();
    const hash = await sha256('email:' + normalized);
    await supabase.from('claims').upsert({
      user_id: userId, type: 'contact', provider: 'email',
      label: normalized, value: normalized,
      proof_type: 'password', proof_status: 'verified',
      visibility: 'private', hash, weight: 1
    }, { onConflict: 'hash' });
  };

  const createClaim = async (provider, label, value) => {
    if (!user) return null;
    try {
      const hash = await sha256(provider + ':' + value.toLowerCase().trim());
      const { data, error } = await supabase.from('claims').upsert({
        user_id: user.id, type: 'account', provider,
        label: label.trim(), value: value.trim(),
        proof_type: 'self_reported', proof_status: 'unverified',
        visibility: 'public', hash, weight: 0
      }, { onConflict: 'hash' }).select().single();
      if (error) { console.error('[Aura] Claim create failed:', error); return null; }
      setClaims(prev => [...prev.filter(c => c.hash !== hash), data]);
      return data;
    } catch (err) { console.warn('[Aura] Claim create error:', err.message); return null; }
  };

  const removeClaim = async (claimId) => {
    if (!user) return false;
    const { error } = await supabase.from('claims').delete().eq('id', claimId).eq('user_id', user.id);
    if (!error) setClaims(prev => prev.filter(c => c.id !== claimId));
    return !error;
  };

  const updateClaimVisibility = async (claimId, visibility) => {
    if (!user) return false;
    const { error } = await supabase.from('claims').update({ visibility }).eq('id', claimId).eq('user_id', user.id);
    if (!error) setClaims(prev => prev.map(c => c.id === claimId ? { ...c, visibility } : c));
    return !error;
  };

  const setPrimaryClaim = async (claimId) => {
    if (!user) return false;
    await supabase.from('claims').update({ weight: 0 }).eq('user_id', user.id);
    const { error } = await supabase.from('claims').update({ weight: 1, visibility: 'public' }).eq('id', claimId).eq('user_id', user.id);
    if (!error) setClaims(prev => prev.map(c => ({ ...c, weight: c.id === claimId ? 1 : 0, ...(c.id === claimId ? { visibility: 'public' } : {}) })));
    return !error;
  };

  // --- Auth functions ---
  const signUp = async (email, password) => {
    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) throw error;
    return data;
  };

  const signIn = async (email, password) => {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data;
  };

  const signOut = async () => {
    await supabase.auth.signOut();
    setUser(null);
    setProfile(null);
    setClaims([]);
  };

  // --- OAuth identity linking ---
  const linkProvider = async (providerName) => {
    // providerName is the Supabase provider name (e.g. 'twitter', 'google', 'github', 'apple')
    // Remember we were on settings so we come back here after OAuth redirect
    sessionStorage.setItem('aura-return-screen', 'settings');
    const { data, error } = await supabase.auth.linkIdentity({
      provider: providerName,
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
    if (error) { console.error('[Aura] Link identity failed:', error); throw error; }
    return data;
  };

  const unlinkProvider = async (providerName) => {
    if (!user) return false;
    // Find the identity to unlink
    const identity = (user.identities || []).find(i => i.provider === providerName);
    if (!identity) return false;
    const { error } = await supabase.auth.unlinkIdentity(identity);
    if (error) { console.error('[Aura] Unlink identity failed:', error); return false; }
    // Also remove the corresponding claim
    const providerConfig = STAMP_PROVIDERS.find(p => p.supabaseProvider === providerName);
    if (providerConfig) {
      const matchingClaim = claims.find(c => c.provider === providerConfig.id && c.proof_type === 'oauth');
      if (matchingClaim) await removeClaim(matchingClaim.id);
    }
    // Refresh user to get updated identities
    const { data: { user: freshUser } } = await supabase.auth.getUser();
    if (freshUser) setUser(freshUser);
    return true;
  };

  // Sync OAuth identities → verified claims
  const syncIdentityClaims = async (authUser) => {
    if (!authUser) return;
    const identities = authUser.identities || [];
    for (const identity of identities) {
      if (identity.provider === 'email') continue; // email handled separately
      const providerConfig = STAMP_PROVIDERS.find(p => p.supabaseProvider === identity.provider);
      if (!providerConfig) continue;
      const username = getOAuthUsername(identity);
      if (!username) continue;
      const hash = await sha256(providerConfig.id + ':oauth:' + identity.id);
      await supabase.from('claims').upsert({
        user_id: authUser.id, type: 'account', provider: providerConfig.id,
        label: username, value: username,
        proof_type: 'oauth', proof_status: 'verified',
        visibility: 'public', hash, weight: 0
      }, { onConflict: 'hash' });
    }
  };

  // --- Auth state listener ---
  useEffect(() => {
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      if (session?.user) {
        setUser(session.user);
        // CRITICAL: setTimeout(0) to avoid Supabase deadlock (LESSONS.md)
        setTimeout(async () => {
          try {
            if (event === 'SIGNED_IN') {
              await createEmailClaim(session.user.id, session.user.email);
            }
            // Sync OAuth identities to verified claims
            await syncIdentityClaims(session.user);
            const prof = await loadProfile(session.user.id);
            setProfile(prof);
            const userClaims = await loadClaims(session.user.id);
            setClaims(userClaims);
          } catch (err) {
            console.warn('[Aura] Post-auth sync error:', err.message);
          }
          setLoading(false);
        }, 0);
      } else {
        setUser(null);
        setProfile(null);
        setClaims([]);
        setLoading(false);
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  // Helper: check if a provider is linked via OAuth
  const isOAuthLinked = (supabaseProviderName) => {
    return (user?.identities || []).some(i => i.provider === supabaseProviderName);
  };

  const value = useMemo(() => ({
    user, profile, claims, loading,
    signUp, signIn, signOut, linkProvider, unlinkProvider, isOAuthLinked,
    updateDisplayName, updateEntityType, updateProfileSummary,
    createClaim, removeClaim, updateClaimVisibility, setPrimaryClaim,
    loadClaims,
  }), [user, profile, claims, loading]);

  return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
};

// — TOAST CONTEXT (replaces window.__auraToast)
const ToastContext = createContext(null);
const useToast = () => useContext(ToastContext);
const ToastProvider = ({ children }) => {
  const [msg, setMsg] = useState(null);
  const timerRef = useRef(null);
  const toast = useCallback((text, duration = 4000) => {
    clearTimeout(timerRef.current);
    setMsg(text);
    timerRef.current = setTimeout(() => setMsg(null), duration);
  }, []);
  const dismiss = useCallback(() => { clearTimeout(timerRef.current); setMsg(null); }, []);
  // Expose globally for pre-React code (OAuth redirects)
  useEffect(() => {
    window.__auraToast = toast;
    return () => { delete window.__auraToast; };
  }, [toast]);
  return (
    <ToastContext.Provider value={{ toast, dismiss, msg }}>
      {children}
    </ToastContext.Provider>
  );
};

// — CLOUD SYNC HOOK (assessment_results table)
// Retry queue for failed cloud operations
const RETRY_QUEUE_KEY = 'aura-sync-retry-queue';
const getRetryQueue = () => { try { return JSON.parse(localStorage.getItem(RETRY_QUEUE_KEY) || '[]'); } catch { return []; } };
const setRetryQueue = (q) => localStorage.setItem(RETRY_QUEUE_KEY, JSON.stringify(q));
const addToRetryQueue = (op) => { const q = getRetryQueue(); q.push(op); setRetryQueue(q); };

const useCloudSync = () => {
  const auth = useAuth();
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | synced | failed

  const withRetry = async (fn, retryOp) => {
    setSyncStatus('syncing');
    try {
      await fn();
      setSyncStatus('synced');
      setTimeout(() => setSyncStatus(s => s === 'synced' ? 'idle' : s), 3000);
    } catch (err1) {
      // Retry once
      try { await fn(); setSyncStatus('synced'); setTimeout(() => setSyncStatus(s => s === 'synced' ? 'idle' : s), 3000); }
      catch (err2) { setSyncStatus('failed'); if (retryOp) addToRetryQueue(retryOp); console.warn('[Aura] Cloud op failed after retry:', err2.message); }
    }
  };

  // Process retry queue on mount / auth change
  const retryProcessing = useRef(false);
  const processRetryQueue = useCallback(async () => {
    if (!auth?.user || retryProcessing.current) return;
    const queue = getRetryQueue();
    if (queue.length === 0) return;
    retryProcessing.current = true;
    const failed = [];
    for (const op of queue) {
      try {
        if (op.type === 'completed') {
          await supabase.from('assessment_results').upsert({ user_id: auth.user.id, category_id: op.testId, status: 'completed', answers: op.answers || {}, traits: op.traits || {}, progress: null, completed_at: op.completedAt, updated_at: new Date().toISOString() }, { onConflict: 'user_id,category_id' });
        } else if (op.type === 'progress') {
          await supabase.from('assessment_results').upsert({ user_id: auth.user.id, category_id: op.testId, status: 'in_progress', answers: op.progress || {}, traits: null, progress: op.progress || {}, updated_at: new Date().toISOString() }, { onConflict: 'user_id,category_id' });
        }
      } catch { failed.push(op); }
    }
    setRetryQueue(failed);
    retryProcessing.current = false;
    if (failed.length === 0) setSyncStatus(s => s === 'failed' ? 'idle' : s);
  }, [auth?.user?.id]);
  useEffect(() => { processRetryQueue(); }, [processRetryQueue]);

  const saveCompleted = async (testId, answers, traits) => {
    if (!auth?.user) return;
    const now = new Date().toISOString();
    await withRetry(
      async () => {
        const { error } = await supabase.from('assessment_results').upsert({
          user_id: auth.user.id, category_id: testId, status: 'completed',
          answers: answers || {}, traits: traits || {}, progress: null,
          completed_at: now, updated_at: now
        }, { onConflict: 'user_id,category_id' });
        if (error) throw error;
      },
      { type: 'completed', testId, answers, traits, completedAt: now }
    );
  };

  const saveProgress = async (testId, progressObj) => {
    if (!auth?.user) return;
    await withRetry(
      async () => {
        const { error } = await supabase.from('assessment_results').upsert({
          user_id: auth.user.id, category_id: testId, status: 'in_progress',
          answers: progressObj || {}, traits: null, progress: progressObj || {},
          updated_at: new Date().toISOString()
        }, { onConflict: 'user_id,category_id' });
        if (error) throw error;
      },
      { type: 'progress', testId, progress: progressObj }
    );
  };

  const loadAll = async () => {
    if (!auth?.user) return null;
    const { data, error } = await supabase.from('assessment_results').select('*').eq('user_id', auth.user.id);
    if (error) { console.error('[Aura] Cloud load failed:', error); return null; }
    const completed = {}, inProgress = {};
    for (const row of (data || [])) {
      if (row.status === 'completed') completed[row.category_id] = row.traits || {};
      else inProgress[row.category_id] = { index: row.progress?.index || 0, responses: row.progress?.responses || row.answers?.responses || {}, skipped: row.progress?.skipped || row.answers?.skipped || [] };
    }
    return { completed, inProgress };
  };

  const deleteAssessment = async (testId) => {
    if (!auth?.user) return;
    await supabase.from('assessment_results').delete().eq('user_id', auth.user.id).eq('category_id', testId);
  };

  const clearAll = async () => {
    if (!auth?.user) return;
    await supabase.from('assessment_results').delete().eq('user_id', auth.user.id);
  };

  const syncOnLogin = async (localCompleted, localInProgress) => {
    if (!auth?.user) return null;
    const cloud = await loadAll();
    if (!cloud) {
      // No cloud data — upload everything local
      for (const [testId, traits] of Object.entries(localCompleted || {})) {
        await saveCompleted(testId, {}, traits);
      }
      for (const [testId, progress] of Object.entries(localInProgress || {})) {
        await saveProgress(testId, progress);
      }
      return { completed: localCompleted || {}, inProgress: localInProgress || {} };
    }
    // Merge: cloud wins completed, local wins in-progress
    const mergedCompleted = { ...localCompleted, ...cloud.completed };
    const mergedInProgress = { ...cloud.inProgress };
    for (const [testId, progress] of Object.entries(localInProgress || {})) {
      if (!mergedCompleted[testId]) {
        // Local in-progress, not completed in cloud — local wins
        mergedInProgress[testId] = progress;
        await saveProgress(testId, progress);
      }
    }
    // Upload local completed that cloud didn't have
    for (const [testId, traits] of Object.entries(localCompleted || {})) {
      if (!cloud.completed[testId]) await saveCompleted(testId, {}, traits);
    }
    return { completed: mergedCompleted, inProgress: mergedInProgress };
  };

  return { saveCompleted, saveProgress, loadAll, deleteAssessment, clearAll, syncOnLogin, syncStatus, setSyncStatus, processRetryQueue };
};

// — RESPONSE CAPTURE HOOK (responses table, auth-gated)
const useResponses = () => {
  const auth = useAuth();

  const captureResponse = async (questionId, answer, confidence, snapshot) => {
    if (!auth?.user) return;
    try {
      await supabase.from('responses').insert({
        session_id: AURA_SESSION_ID, question_id: questionId,
        answer: String(answer), confidence,
        email: auth.user.email, snapshot
      });
    } catch (err) { console.warn('[Aura] Response capture error:', err.message); }
  };

  const captureAssessResponse = async (testId, questionIndex, answer, snapshot) => {
    if (!auth?.user) return;
    try {
      await supabase.from('responses').insert({
        session_id: AURA_SESSION_ID, question_id: -(questionIndex + 1),
        answer: String(answer), confidence: 0,
        email: auth.user.email, test_id: testId, snapshot
      });
    } catch (err) { console.warn('[Aura] Assess capture error:', err.message); }
  };

  // One-time backfill: push localStorage responses to cloud after sign-in
  const backfillResponses = async (localResponses) => {
    if (!auth?.user) return;
    const entries = Object.entries(localResponses);
    if (entries.length === 0) return;
    try {
      const rows = entries.map(([qId, resp]) => ({
        session_id: AURA_SESSION_ID, question_id: qId,
        answer: String(resp.answer ?? resp), confidence: resp.confidence || 1,
        email: auth.user.email,
      }));
      await supabase.from('responses').upsert(rows, { onConflict: 'session_id,question_id' });
    } catch (err) { console.warn('[Aura] Backfill error:', err.message); }
  };

  return { captureResponse, captureAssessResponse, backfillResponses };
};

// — COMPARE HOOK (comparisons table)
const useCompare = () => {
  const auth = useAuth();

  const generateId = () => {
    const chars = 'abcdefghijkmnpqrstuvwxyz23456789';
    let id = '';
    for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
    return id;
  };

  const createComparison = async (traits, name, entityType) => {
    const id = generateId();
    try {
      const { error } = await supabase.from('comparisons').insert({ id, traits, name: name || null, entity_type: entityType || 'human' });
      if (error) { console.warn('[Aura] Comparison save failed:', error.message); return null; }
      return id;
    } catch (err) { console.warn('[Aura] Comparison save error:', err.message); return null; }
  };

  const loadComparison = async (id) => {
    try {
      const { data, error } = await supabase.from('comparisons').select('traits, name, entity_type').eq('id', id).single();
      if (error || !data) return null;
      return { traits: data.traits, name: data.name, entity: data.entity_type };
    } catch (err) { console.warn('[Aura] Comparison load error:', err.message); return null; }
  };

  const getCompareUrl = (shortId) => `${window.location.origin}${window.location.pathname}?c=${shortId}`;

  return { createComparison, loadComparison, getCompareUrl };
};

// --- Layout ---

const Stack = ({ direction = 'column', gap = 3, align, children, className = '', style, ...props }) => {
  const isRow = direction === 'row';
  const al = align || (isRow ? 'center' : undefined);
  return <div className={`flex ${isRow ? 'flex-row' : 'flex-col'} gap-${gap} ${al ? `items-${al}` : ''} ${className}`} style={style} {...props}>{children}</div>;

const Container = ({ maxWidth = 480, padding = true, children, className = '', style, ...props }) => (
  <div className={`mx-auto w-full ${padding ? 'px-4 sm:px-6' : ''} ${className}`} style={{ maxWidth, ...style }} {...props}>{children}</div>
);
// --- Text ---

const TEXT_SIZES = { xxs: 'text-xs', xs: 'text-sm', sm: 'text-base', base: 'text-lg', lg: 'text-xl', xl: 'text-2xl', '2xl': 'text-3xl', '3xl': 'text-4xl', '4xl': 'text-5xl' };
const TEXT_WEIGHTS = { normal: 'font-normal', medium: 'font-medium', semibold: 'font-semibold', bold: 'font-bold' };
const HEADING_PRESETS = {
  1: { as: 'h1', size: '2xl', weight: 'bold' },
  2: { as: 'h2', size: 'xl',  weight: 'bold' },
  3: { as: 'h3', size: 'lg',  weight: 'semibold' },
  4: { as: 'h4', size: 'base', weight: 'semibold' },
  5: { as: 'h5', size: 'sm',  weight: 'semibold' },
};

const Text = ({ as, heading, size, weight, emphasis = 'primary', color, children, className = '', style, ...props }) => {
  const preset = heading ? HEADING_PRESETS[heading] : null;
  const Tag = as || preset?.as || 'p';
  const sz = size || preset?.size || 'base';
  const wt = weight || preset?.weight || 'normal';
  const emphasisColor = { primary: 'var(--text-primary)', secondary: 'var(--text-secondary)', muted: 'var(--text-muted)', subtle: 'var(--text-subtle)', faint: 'var(--text-faint)' };
  const colorStyle = color ? { color } : { color: emphasisColor[emphasis] };
  return <Tag className={`${TEXT_SIZES[sz]} ${TEXT_WEIGHTS[wt]} ${className}`} style={{ ...colorStyle, ...style }} {...props}>{children}</Tag>;
};

// --- Button ---

const Button = ({ variant = 'primary', color = 'violet', size = 'md', shine, loading, children, className = '', style, disabled, onClick, ...props }) => {
  const c = colorOf(color);
  const isDisabled = disabled || loading;
  const sizes = { sm: 'px-3 py-1.5 text-sm rounded-lg', md: 'px-5 py-2.5 text-base rounded-xl', lg: 'px-6 py-3.5 text-lg rounded-xl', full: 'w-full py-3.5 px-6 text-lg rounded-xl' };
  const sizeClass = sizes[size] || sizes.md;
  const shineCls = shine ? 'shine-card' : '';
  const accentVar = shine ? { '--accent-rgb': c.rgb } : {};
  const variants = {
    primary: { cls: `text-white font-semibold btn-feedback ${shineCls} ${sizeClass}`, st: { background: `linear-gradient(135deg, ${c.base}, ${c.light})`, ...accentVar } },
    secondary: { cls: `font-medium btn-feedback ${sizeClass}`, st: { background: 'var(--btn-secondary-bg)', color: 'var(--text-secondary)' } },
    ghost: { cls: `font-medium ${sizeClass}`, st: { background: 'transparent', color: 'var(--btn-ghost-text)' } },
    outline: { cls: `font-medium btn-feedback ${sizeClass}`, st: { background: 'transparent', border: `1.5px solid ${c.base}`, color: c.base } },
  };
  const v = variants[variant] || variants.primary;
  return <button className={`transition-all cursor-pointer select-none ${v.cls} ${className}`} style={{ ...v.st, ...(isDisabled ? { opacity: 0.4, pointerEvents: 'none' } : {}), ...style }} disabled={isDisabled} onClick={onClick} {...props}>
    {loading ? <><span className="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full mr-2" style={{ animation: 'spin 0.6s linear infinite' }} />Loading...</> : children}
  </button>;
};

// --- Card ---

const Card = ({ variant = 'plain', color, glow, shine, padding = true, children, className = '', style, onClick, ...props }) => {
  const base = `rounded-2xl overflow-hidden transition-all ${onClick ? 'cursor-pointer' : ''}`;
  const pad = padding ? 'p-4' : '';
  const c = color ? colorOf(color) : null;
  const glowFull = glow && glow !== 'soft';
  const coloredSt = c ? {
    background: `linear-gradient(135deg, rgba(${c.rgb},${glowFull ? 0.15 : 0.08}), rgba(${c.rgb},${glowFull ? 0.05 : 0.02}))`,
    border: `1px solid rgba(${c.rgb},${glowFull ? 0.4 : 0.3})`
  } : null;
  const variants = {
    plain: { cls: `${base} ${pad}`, st: coloredSt || { background: 'var(--bg-card)', border: '1px solid var(--border-card)', boxShadow: 'var(--shadow-card)' } },
    elevated: { cls: `${base} ${pad}`, st: { background: 'var(--bg-elevated)', border: '1px solid var(--border-subtle)', boxShadow: 'var(--shadow-elevated)' } },
  };
  const v = variants[variant] || variants.plain;
  const glowCls = glow && c ? (glow === 'soft' ? 'glow-soft' : 'glow') : '';
  const shineCls = shine && c ? 'shine-card' : '';
  const accentVar = c ? { '--accent-rgb': c.rgb } : {};
  return <div className={`${v.cls} ${glowCls} ${shineCls} ${className}`} style={{ ...v.st, ...accentVar, ...style }} onClick={onClick} {...props}>{children}</div>;
};

// --- Screen ---

// Scroll position cache — preserves scroll when navigating away and back
const _scrollCache = {};
const useScrollRestore = (screenId) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el || !screenId) return;
    if (_scrollCache[screenId]) el.scrollTop = _scrollCache[screenId];
    const onScroll = () => {
      _scrollCache[screenId] = el.scrollTop;
      const keys = Object.keys(_scrollCache);
      if (keys.length > 20) keys.slice(0, 10).forEach(k => delete _scrollCache[k]);
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => { el.removeEventListener('scroll', onScroll); };
  }, [screenId]);
  return ref;
};

const Screen = ({ header, footer, children, className = '', style }) => {
  const screenRef = useRef(null);
  useEffect(() => {
    if (!screenRef.current) return;
    const heading = screenRef.current.querySelector('h1, h2, h3, [role="heading"]');
    if (heading && !document.querySelector('[role="dialog"]')) {
      heading.tabIndex = -1;
      heading.focus({ preventScroll: true });
    }
  }, []);
  return (
    <div ref={screenRef} className={`h-full flex flex-col ${className}`} style={{ background: 'var(--bg-main)', ...style }}>
      {header}
      {children}
      {footer}
    </div>
  );
};
Screen.Body = ({ children, className = '', padding = true, screenId }) => {
  const scrollRef = useScrollRestore(screenId);
  return <div ref={scrollRef} className={`flex-1 overflow-y-auto ${padding ? 'p-4' : ''} ${className}`}>{children}</div>;
};

  const gradId = `ring-${color}-${size}-${Math.random().toString(36).slice(2,6)}`;
  return (
    <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>

          <stop offset="0%" stopColor={progress > 0 ? c.base : 'var(--ring-track)'} />

        </linearGradient></defs>
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="var(--ring-track)" strokeWidth={strokeWidth} />
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={`url(#${gradId})`} strokeWidth={strokeWidth}
          strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={circumference * (1 - progress / 100)}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null, resetCount: 0 }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error(`[ErrorBoundary:${this.props.feature || 'app'}]`, error, info); }
  render() {
    if (this.state.hasError) {
      const feature = this.props.feature;
      const isFeature = !!feature;
      return (
        <Card variant="plain" className={isFeature ? 'my-4 mx-4' : 'h-full flex flex-col items-center justify-center p-8'} style={!isFeature ? { background: 'var(--bg-main)' } : {}}>

            <Text size="xs" emphasis="muted" className="text-center">{this.state.error?.message || 'An unexpected error occurred'}</Text>
            <Button size="sm" variant={isFeature ? 'secondary' : 'primary'} onClick={() => this.setState(s => ({ hasError: false, error: null, resetCount: s.resetCount + 1 }))}>
              Try Again
            </Button>
          </Stack>
        </Card>
      );
    }
    return <React.Fragment key={this.state.resetCount}>{this.props.children}</React.Fragment>;

}

// — HOOKS — useAnswerFlow, useQotd
const useAnswerFlow = ({ undoDelay = 1, tapDelay = 400, graceEnabled = false, graceDuration = 1200, requireConfirmation = false, onPending, onFinalize }) => {
  const [tappedAnswer, setTappedAnswer] = useState(null);
  const [tapCount, setTapCount] = useState(0);
  const [pendingSubmit, setPendingSubmit] = useState(null);
  const [inGracePeriod, setInGracePeriod] = useState(false);
  const [justUndone, setJustUndone] = useState(false);
  const submitTimeoutRef = useRef(null);
  const tapTimeoutRef = useRef(null);
  const graceTimeoutRef = useRef(null);
  const onPendingRef = useRef(onPending);
  const onFinalizeRef = useRef(onFinalize);
  onPendingRef.current = onPending;
  onFinalizeRef.current = onFinalize;
  const doFinalize = (answer, confidence, extra) => {
    if (graceTimeoutRef.current) clearTimeout(graceTimeoutRef.current);
    setInGracePeriod(false); setPendingSubmit(null);
    onFinalizeRef.current?.(answer, confidence, extra);
  };
  const doPend = (answer, confidence) => {
    if (submitTimeoutRef.current) clearTimeout(submitTimeoutRef.current);
    if (tapTimeoutRef.current) clearTimeout(tapTimeoutRef.current);
    setJustUndone(false);
    const extra = onPendingRef.current?.(answer, confidence);
    setPendingSubmit({ answer, confidence, extra });
    setTappedAnswer(null); setTapCount(0);
    if (graceEnabled) { setInGracePeriod(true); if (graceTimeoutRef.current) clearTimeout(graceTimeoutRef.current); graceTimeoutRef.current = setTimeout(() => setInGracePeriod(false), graceDuration); }
    if (undoDelay === 0) doFinalize(answer, confidence, extra);
    else submitTimeoutRef.current = setTimeout(() => doFinalize(answer, confidence, extra), undoDelay * 1000);
  };
  const handleTap = (answer) => {
    if (pendingSubmit && inGracePeriod && graceEnabled) {
      if (answer === pendingSubmit.answer && pendingSubmit.confidence < 4) {
        const newConf = pendingSubmit.confidence + 1;
        haptic(HAPTIC.confidence);
        setPendingSubmit({ ...pendingSubmit, confidence: newConf });
        if (graceTimeoutRef.current) clearTimeout(graceTimeoutRef.current);
        graceTimeoutRef.current = setTimeout(() => setInGracePeriod(false), graceDuration);
        if (submitTimeoutRef.current) clearTimeout(submitTimeoutRef.current);
        if (undoDelay > 0) submitTimeoutRef.current = setTimeout(() => doFinalize(answer, newConf, pendingSubmit.extra), undoDelay * 1000);
      }
      return;
    }
    if (pendingSubmit) return;
    if (tapTimeoutRef.current) clearTimeout(tapTimeoutRef.current);
    let newCount;
    if (tappedAnswer === answer) { newCount = Math.min(tapCount + 1, 3); setTapCount(newCount); haptic(HAPTIC.confidence); }
    else { newCount = 1; setTappedAnswer(answer); setTapCount(1); haptic(HAPTIC.tap); }
    if (!requireConfirmation) tapTimeoutRef.current = setTimeout(() => doPend(answer, newCount), tapDelay);
  };
  const handleRightClick = (e, answer) => { e.preventDefault(); if (pendingSubmit || tappedAnswer !== answer) return; if (tapCount > 1) setTapCount(tapCount - 1); };
  const handleUndo = () => {
    haptic(HAPTIC.undo);
    if (submitTimeoutRef.current) clearTimeout(submitTimeoutRef.current);
    if (graceTimeoutRef.current) clearTimeout(graceTimeoutRef.current);
    setInGracePeriod(false);
    if (pendingSubmit) { setTappedAnswer(pendingSubmit.answer); setTapCount(pendingSubmit.confidence); setJustUndone(true); }
    setPendingSubmit(null);
  };
  const clearUndone = () => { setTappedAnswer(null); setTapCount(0); setJustUndone(false); };
  const submit = () => { if (tappedAnswer === null) return; doPend(tappedAnswer, tapCount); };
  const reset = () => {
    if (submitTimeoutRef.current) clearTimeout(submitTimeoutRef.current);
    if (tapTimeoutRef.current) clearTimeout(tapTimeoutRef.current);
    if (graceTimeoutRef.current) clearTimeout(graceTimeoutRef.current);
    setTappedAnswer(null); setTapCount(0); setPendingSubmit(null); setInGracePeriod(false); setJustUndone(false);
  };
  return { tappedAnswer, setTappedAnswer, tapCount, setTapCount, pendingSubmit, inGracePeriod, justUndone, setJustUndone, handleTap, handleRightClick, handleUndo, clearUndone, submit, reset };
};

const useQotd = (undoDelay = 1) => {
  const [qotdData, setQotdData] = useState(() => getRandomQOTD());
  const [qotdResponse, setQotdResponse] = useState(null);
  const flow = useAnswerFlow({ undoDelay, onFinalize: (answer, confidence) => setQotdResponse({ answer, confidence }) });
  const resetQotd = () => { flow.reset(); setQotdResponse(null); setQotdData(getRandomQOTD()); };
  return { qotdData, qotdResponse, setQotdResponse, qotdTappedAnswer: flow.tappedAnswer, qotdTapCount: flow.tapCount, qotdPending: flow.pendingSubmit, resetQotd, handleQotdTap: flow.handleTap, handleQotdUndo: flow.handleUndo };
};

      </div>

};

// ==================== ON-RAMP V2: QUICK READ ====================
// 8 questions → 3 encouragement beats → Quick Read result → two exits
const ONRAMP_QUESTIONS = [
  { id: 'or-1', text: "Which came first?", options: ["The chicken", "The egg"], icons: ["🐔", "🥚"], colors: ['amber', 'blue'] },
  { id: 'or-2', text: "Dogs or cats?", options: ["Dogs", "Cats"], icons: ["🐕", "🐈"], colors: ['blue', 'emerald'] },
  { id: 'or-3', text: "Better superpower?", options: ["Flight", "Invisibility"], icons: ["🦅", "👻"], colors: ['cyan', 'pink'] },
  { id: 'or-4', text: "Is a hot dog a sandwich?", options: ["Yes", "No"], icons: ["🌭", "🚫"], colors: ['amber', 'rose'] },
  { id: 'or-5', text: "Pineapple on pizza?", options: ["Yes please", "Absolutely not"], icons: ["🍍", "🍕"], colors: ['emerald', 'rose'] },
  { id: 'or-6', text: "Rather be early or exactly on time?", options: ["Early", "On time"], icons: ["⏰", "🎯"], colors: ['teal', 'violet'] },
  { id: 'or-7', text: "Trust your gut or trust the data?", options: ["Gut", "Data"], icons: ["💡", "📊"], colors: ['amber', 'indigo'] },
  { id: 'or-8', text: "Cashier gives you $20 too much. Keep it?", options: ["Keep it", "Say something"], icons: ["💰", "🤝"], colors: ['amber', 'emerald'] },
];

const ONRAMP_MAJORITY = { 'or-4': 1, 'or-5': 1 };

function scoreQuickRead(answers, timings) {
  const openness = (answers['or-4'] === 0 ? 1 : 0) + (answers['or-5'] === 0 ? 1 : 0);
  const consc = answers['or-6'] === 0 ? 1 : 0;
  const intuitive = answers['or-7'] === 0;
  const principled = answers['or-8'] === 1;
  const earlyTimes = [timings['or-1'], timings['or-2'], timings['or-3']].filter(Boolean);
  const avgEarly = earlyTimes.length > 0 ? earlyTimes.reduce((a,b) => a+b, 0) / earlyTimes.length : 2000;
  const fast = avgEarly < 2500;
  return { openness, consc, intuitive, principled, fast };
}

const QUICK_READ_BANK = [
  { match: s => s.fast && s.intuitive && s.principled,
    text: "You trust your gut and move. No second-guessing, no shortcuts." },
  { match: s => s.fast && s.intuitive && !s.principled,
    text: "You read the room fast and act on instinct. The rulebook is more of a suggestion." },
  { match: s => s.fast && !s.intuitive && s.principled,
    text: "You need the logic to check out \u2014 fast. Doing right and thinking clearly are the same thing." },
  { match: s => s.fast && !s.intuitive && !s.principled,
    text: "You run the numbers before anyone else blinks. The smartest move wins, rules or not." },
  { match: s => !s.fast && s.intuitive && s.principled,
    text: "You let decisions breathe. When the moment\u2019s right, doing the right thing is just reflex." },
  { match: s => !s.fast && s.intuitive && !s.principled,
    text: "You wait for the feeling to land. Once it does, the rulebook can wait." },
  { match: s => !s.fast && !s.intuitive && s.principled,
    text: "You work the problem until it\u2019s solved right. Patient, principled, every time." },
  { match: s => !s.fast && !s.intuitive && !s.principled,
    text: "You map every option before choosing. What works matters more than what\u2019s proper." },
  { match: s => s.openness === 2 && s.fast,
    text: "You\u2019re open to anything and ready now. A little chaos never hurt." },
  { match: s => s.openness === 2 && s.principled,
    text: "You\u2019ll entertain any idea \u2014 except a dishonest one. Flexible mind, firm backbone." },
  { match: s => s.openness === 0 && !s.intuitive && s.principled,
    text: "You trust what\u2019s proven and follow through. The rules exist for a reason." },
  { match: s => s.openness === 0 && s.fast,
    text: "You know what you want and don\u2019t waste time deciding. Direct and sure-footed." },
  { match: s => s.consc && s.intuitive,
    text: "You show up prepared but trust the gut once there. Structure meets instinct." },
  { match: s => s.consc && s.principled,
    text: "You believe in doing the work right. No shortcuts, no excuses \u2014 that\u2019s the standard." },
  { match: s => !s.consc && s.openness >= 1 && !s.principled,
    text: "You roll with whatever comes. The gray areas? Not losing sleep over those." },
  { match: s => !s.consc && s.principled,
    text: "You keep things easy but the conscience stays sharp. Relaxed, never careless." },
  { match: s => s.openness >= 1 && !s.fast && !s.intuitive,
    text: "You\u2019ll consider the unexpected \u2014 but only after doing the homework first." },
  { match: s => s.openness === 0 && s.principled && !s.fast,
    text: "You take your time and play it straight. People trust that more than they realize." },
  { match: s => s.openness === 2 && s.intuitive && !s.consc,
    text: "You follow curiosity wherever it wanders. If it feels right, that\u2019s reason enough." },
  { match: () => true,
    text: "You know exactly where you stand \u2014 even on the small stuff. Steady and clear." },
];

function getQuickRead(scores) {
  for (const entry of QUICK_READ_BANK) {
    if (entry.match(scores)) return entry.text;
  }
  return QUICK_READ_BANK[QUICK_READ_BANK.length - 1].text;
}

const OnboardingFlow = ({ isDark, onComplete, onSkip, onReset }) => {
  const [currentIndex, setCurrentIndex] = useState(0);
  const [answers, setAnswers] = useState({});
  const [timings, setTimings] = useState({});
  const [beatText, setBeatText] = useState(null);
  const [beatOpacity, setBeatOpacity] = useState(0);
  const [phase, setPhase] = useState('questions'); // 'questions' | 'quickread'
  const [quickReadText, setQuickReadText] = useState('');
  const [quickReadVisible, setQuickReadVisible] = useState(false);
  const [transitioning, setTransitioning] = useState(false);
  const questionStartTime = useRef(Date.now());
  const pendingNext = useRef(null);

  const question = ONRAMP_QUESTIONS[currentIndex];
  const totalQuestions = ONRAMP_QUESTIONS.length;

  // Reset timer on question change
  useEffect(() => {
    questionStartTime.current = Date.now();
  }, [currentIndex]);

  // Encouragement beat logic
  const showBeat = (text, duration = 1500) => {
    setBeatText(text);
    setBeatOpacity(1);
    return new Promise(resolve => {
      setTimeout(() => {
        setBeatOpacity(0);
        setTimeout(() => { setBeatText(null); resolve(); }, 400);
      }, duration);
    });
  };

  const advanceQuestion = (latestAnswers, latestTimings) => {
    setTransitioning(true);
    // Wait for full fade-out (matches CSS transition duration) before swapping content
    setTimeout(() => {
      if (currentIndex < totalQuestions - 1) {
        setCurrentIndex(currentIndex + 1);
        // New content renders at opacity 0 (still transitioning), then fade in next frame
        requestAnimationFrame(() => requestAnimationFrame(() => setTransitioning(false)));
      } else {
        const ans = latestAnswers || answers;
        const tms = latestTimings || timings;
        const scores = scoreQuickRead(ans, tms);
        const read = getQuickRead(scores);
        setQuickReadText(read);
        localStorage.setItem('aura_quickread_answers', JSON.stringify({ answers: ans, timings: tms }));
        localStorage.setItem('aura_quickread_result', JSON.stringify({ text: read, scores, ts: Date.now() }));
        setPhase('quickread');
        setTransitioning(false);
        setTimeout(() => setQuickReadVisible(true), 100);
      }
    }, 280);
  };

  const handleTap = async (answerIdx) => {
    if (answers[question?.id] !== undefined || transitioning) return;
    const elapsed = Date.now() - questionStartTime.current;
    const newAnswers = { ...answers, [question.id]: answerIdx };
    const newTimings = { ...timings, [question.id]: elapsed };
    setAnswers(newAnswers);
    setTimings(newTimings);

    const qNum = currentIndex + 1;

    if (qNum === 3) {
      const t1 = newTimings['or-1'] || 3000;
      const t2 = newTimings['or-2'] || 3000;
      const t3 = elapsed;
      const total = t1 + t2 + t3;
      const anyOver3s = t1 > 3000 || t2 > 3000 || t3 > 3000;
      const beatMsg = anyOver3s ? "You actually thought about that one." : (total < 6000 ? "You don't hesitate." : null);
      if (beatMsg) await showBeat(beatMsg, 2200);
      advanceQuestion(newAnswers, newTimings);
    } else if (qNum === 5) {
      const q4ans = newAnswers['or-4'];
      const q5ans = answerIdx;
      const q4majority = ONRAMP_MAJORITY['or-4'];
      const q5majority = ONRAMP_MAJORITY['or-5'];
      const withMajority = (q4ans === q4majority ? 1 : 0) + (q5ans === q5majority ? 1 : 0);
      const beatMsg = withMajority >= 2 ? "Safe choice." : "Controversial.";
      await showBeat(beatMsg, 2000);
      advanceQuestion(newAnswers, newTimings);
    } else if (qNum === 7) {
      await showBeat("That one matters. Remember your answer.", 2500);
      advanceQuestion(newAnswers, newTimings);
    } else {
      advanceQuestion(newAnswers, newTimings);
    }
  };

  const handleReveal = () => {
    const flat = { ...answers };
    onComplete({ answers: flat, timings, quickRead: quickReadText, keepGoing: true, path: 'reveal' });
  };
  const handleExplore = () => {
    const flat = { ...answers };
    onComplete({ answers: flat, timings, quickRead: quickReadText, keepGoing: true, path: 'explore' });
  };
  const handleImGood = () => {
    const flat = { ...answers };
    onComplete({ answers: flat, timings, quickRead: quickReadText, keepGoing: false });
  };

  // Quick Read result screen
  if (phase === 'quickread') {
    const vc = colorOf('violet');
    const tc = colorOf('teal');
    return (
      <Screen className="overflow-hidden">
        {/* Atmospheric glow */}
        <div className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{ top: '-10%' }}>
          <div style={{
            position: 'absolute', width: 500, height: 500, borderRadius: '50%',
            background: `radial-gradient(circle, rgba(${vc.rgb},${isDark?0.12:0.10}) 0%, rgba(${vc.rgb},0.04) 40%, transparent 70%)`,
            animation: 'aura-breathe 10s ease-in-out infinite',
          }} />
        </div>

        <Stack align="center" className="flex-1 px-6 relative z-10 justify-center"
          style={{ opacity: quickReadVisible ? 1 : 0, transition: 'opacity 0.8s ease-out' }}>
          <Card color="violet" glow shine className="max-w-sm w-full rounded-3xl" style={{
            backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
            boxShadow: isDark
              ? `0 0 40px rgba(${vc.rgb},0.15), 0 0 80px rgba(${vc.rgb},0.06), 0 8px 32px rgba(0,0,0,0.4)`
              : `0 0 30px rgba(${vc.rgb},0.12), 0 8px 32px rgba(0,0,0,0.08)`,
            padding: '2.5rem 2rem',
          }}>
            <Text size="xs" weight="semibold" emphasis="muted" className="tracking-widest uppercase text-center mb-3">
              A quick read on you
            </Text>
            <div className="w-10 mx-auto mb-5" style={{ height: 2, background: `rgba(${vc.rgb}, 0.4)`, borderRadius: 1 }} />
            <Text size="xl" weight="medium" className="text-center leading-relaxed italic" style={{ textWrap: 'balance' }}>
              "{quickReadText}"
            </Text>
            <Text size="xs" emphasis="faint" className="text-center mt-6">
              That was the quick version. There's a lot more to find.
            </Text>
          </Card>
        </Stack>

        {/* Path choice — integrated into Quick Read */}
        <Stack align="center" className="flex-shrink-0 px-6 pb-8 relative z-10" gap={3}
          style={{ opacity: quickReadVisible ? 1 : 0, transition: 'opacity 1s ease-out 0.5s' }}>
          <Stack className="w-full max-w-sm" gap={3}>
            <Button variant="outline" color="violet" size="full" shine onClick={handleReveal}
              style={{
                background: isDark
                  ? `linear-gradient(135deg, rgba(${vc.rgb},0.14) 0%, rgba(${vc.rgb},0.06) 100%)`
                  : `linear-gradient(135deg, rgba(${vc.rgb},0.12) 0%, rgba(${vc.rgb},0.05) 100%)`,
                borderColor: `rgba(${vc.rgb}, ${isDark ? 0.50 : 0.35})`,
                color: isDark ? vc.light : vc.base,
              }}>
              Go deeper
            </Button>
            <Button variant="outline" color="teal" size="full" shine onClick={handleExplore}
              style={{
                background: isDark
                  ? `linear-gradient(135deg, rgba(${tc.rgb},0.12) 0%, rgba(${tc.rgb},0.05) 100%)`
                  : `linear-gradient(135deg, rgba(${tc.rgb},0.10) 0%, rgba(${tc.rgb},0.04) 100%)`,
                borderColor: `rgba(${tc.rgb}, ${isDark ? 0.40 : 0.30})`,
                color: isDark ? tc.light : tc.base,
              }}>
              Explore questions
            </Button>
          </Stack>
          <Button variant="ghost" size="sm" onClick={handleImGood}>I'm good for now</Button>
        </Stack>
      </Screen>
    );
  }

  // Question phase
  if (!question) return null;

  return (
    <Screen className="overflow-hidden">
      {/* Header */}
      <div className="flex items-center justify-between px-5 pt-4 pb-2">
        <VortexButton onSingleTap={onSkip} onDoubleTap={onReset} className="text-3xl btn-feedback cursor-pointer" />
        <div className="flex items-center gap-1">
          {ONRAMP_QUESTIONS.map((_, i) => (
            <div key={i} className="rounded-full transition-all duration-300" style={{
              width: i === currentIndex ? 16 : 6, height: 6,
              background: i < currentIndex
                ? (isDark ? 'rgba(139,92,246,0.5)' : 'rgba(139,92,246,0.4)')
                : i === currentIndex
                  ? (isDark ? 'rgba(139,92,246,0.8)' : 'rgba(139,92,246,0.7)')
                  : (isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'),
            }} />
          ))}
        </div>
        <div className="w-8" />
      </div>

      {/* Upper zone — question centered, atmospheric */}
      <div className="flex-1 flex flex-col items-center justify-center px-6 relative">
        {/* Encouragement beat overlay */}
        {beatText && (
          <div className="absolute inset-0 flex items-center justify-center z-30 pointer-events-none">
            <Text size="lg" weight="medium" emphasis="subtle" className="italic px-6 text-center"
              style={{ opacity: beatOpacity, transition: 'opacity 0.4s ease-in-out' }}>
              {beatText}
            </Text>
          </div>
        )}

        {/* Aura glow */}
        <div className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{ marginTop: '-8%' }}>
          {(() => {
            const c0 = colorOf(question.colors?.[0]);
            const c1 = colorOf(question.colors?.[1], 'blue');
            return <>
              <div style={{
                position: 'absolute', width: 420, height: 420, borderRadius: '50%',
                background: `radial-gradient(circle, rgba(${c0.rgb},${isDark?0.14:0.12}) 0%, rgba(${c0.rgb},${isDark?0.05:0.06}) 35%, transparent 65%)`,
                animation: 'aura-breathe 8s ease-in-out infinite',
              }} />
              <div style={{
                position: 'absolute', width: 350, height: 350, borderRadius: '50%',
                background: `radial-gradient(circle, rgba(${c1.rgb},0.10) 0%, rgba(${c1.rgb},0.04) 40%, transparent 65%)`,
                animation: 'aura-breathe 6s ease-in-out infinite 1s',
              }} />
            </>;
          })()}
        </div>

        {/* Question text */}
        <div className="max-w-sm px-4 relative" style={{
          opacity: (transitioning || beatText) ? 0 : 1,
          transition: 'opacity 0.25s ease-in-out',
        }}>
          {(() => {
            const c = colorOf(question.colors?.[0]);
            return (
              <div className="absolute inset-0 pointer-events-none" style={{
                width: '200%', height: '200%', left: '-50%', top: '-50%',
                background: `radial-gradient(ellipse at center, rgba(${c.rgb},${isDark?0.12:0.08}) 0%, rgba(${c.rgb},${isDark?0.04:0.02}) 40%, transparent 70%)`,
              }} />
            );
          })()}
          <Text as="h2" weight="medium" className="question-text text-center relative z-10">{question.text}</Text>
        </div>
      </div>

      {/* Lower zone — buttons */}
      <div className="flex-shrink-0 flex flex-col items-center px-6 pb-8">
        <div className="w-full max-w-sm space-y-3" style={{
          opacity: transitioning ? 0 : 1,
          transition: 'opacity 0.2s',
        }}>
          {question.options.map((option, idx) => {
            const icon = question.icons?.[idx];
            const colorName = question.colors?.[idx] || 'violet';
            const c = colorOf(colorName);
            const isChosen = answers[question.id] === idx;
            const isOther = answers[question.id] !== undefined && !isChosen;
            return (
              <button
                key={idx}
                onClick={() => handleTap(idx)}
                disabled={answers[question.id] !== undefined}
                className="w-full h-14 resp-h-lg rounded-2xl flex items-center justify-center gap-4 transition-all btn-feedback shine-card border cursor-pointer"
                style={{
                  borderColor: isChosen ? `rgba(${c.rgb}, ${isDark ? 0.55 : 0.60})` : isDark ? `rgba(${c.rgb}, 0.25)` : `rgba(${c.rgb}, 0.35)`,
                  background: isChosen
                    ? `linear-gradient(135deg, rgba(${c.rgb},0.20) 0%, rgba(${c.rgb},0.10) 100%)`
                    : `linear-gradient(135deg, rgba(${c.rgb},0.08) 0%, rgba(${c.rgb},0.03) 100%)`,
                  boxShadow: isChosen
                    ? `0 0 20px rgba(${c.rgb},0.25), 0 0 40px rgba(${c.rgb},0.12)`
                    : isDark ? `0 0 12px rgba(${c.rgb},0.10), 0 0 30px rgba(${c.rgb},0.05)` : `0 0 8px rgba(${c.rgb},0.08), 0 0 20px rgba(${c.rgb},0.04)`,
                  opacity: isOther ? 0.4 : 1,
                  '--accent-rgb': c.rgb,
                }}
              >
                {icon && <span className="text-xl leading-none">{icon}</span>}
                <span className="resp-text-lg font-semibold" style={{ color: isDark ? c.light : c.base }}>
                  {option}
                </span>
              </button>
            );
          })}
        </div>
        <div className="h-10" />
      </div>
    </Screen>
  );

// — QUESTION FLOW SCREEN
// Question action modal configs
const Q_MODAL_FLAG = { title: 'Flag this question', icon: '🚩', color: 'amber', reasons: ['Unclear', 'Biased', 'Duplicate', 'Wrong category', 'Offensive'] };
const Q_MODAL_EXPLAIN = { title: 'Why did you answer this way?', icon: '💬', color: 'blue', reasons: ['Gut feeling', 'Personal experience', 'Research', 'Logic', 'Clicked wrong', 'Misunderstood'] };
const Q_MODAL_CANT = { title: "Can't answer", icon: '🤷', color: 'slate', reasons: ['Need more context', 'Question is unclear', 'Conflicting feelings', 'Not my area', 'Too personal'] };

const QuestionFlowScreen = ({ isDark, questionState, flowActions, uiState }) => {
  const { currentQuestion, currentIndex, questions, responses, communityResults, isAnswered, isBinary, answeredCount, totalQuestions, currentResponse, mcColorMode, sessionAnsweredIds, savedQuestions, selectedTrack, selectedSub, questionMeta, setQuestionMeta } = questionState;
  const { setCommunityResults, handleUndo, goToPrev, goToNext, findNextUnanswered, setCurrentIndex, handleAnswerTap, handleAnswerRightClick, submitAnswer, saveForLater, skipQuestion, clearUndoneState, setSelectedTrack, setSelectedSub } = flowActions;
  const { pendingSubmit, undoDelay, justUndone, showTips, showGestureHint, setShowGestureHint, showConfirmOverlay, confirmColor, tappedAnswer, setTappedAnswer, tapCount, setTapCount } = uiState;
  const [activeModal, setActiveModal] = useState(null);
  const [evidenceExpanded, setEvidenceExpanded] = useState(false);
  useEffect(() => { setEvidenceExpanded(false); }, [currentQuestion?.id]);
  if (!currentQuestion) return (
    <Placeholder icon="🎉" title="All done!" />
  );
  const hasNext = findNextUnanswered(currentIndex) !== null || currentIndex < questions.length - 1;
  const qMeta = questionMeta[currentQuestion.id] || {};
  // Keyboard shortcuts
  useEffect(() => {
    const handleKey = (e) => {
      if (activeModal) return; // Don't intercept when modal is open
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      switch (e.key) {
        case 'ArrowLeft': e.preventDefault(); goToPrev(); break;
        case 'ArrowRight': case ' ': e.preventDefault(); goToNext(); break;
        case 'y': case 'Y': case '1': if (!isAnswered && !pendingSubmit) handleAnswerTap(0); break;
        case 'n': case 'N': case '2': if (!isAnswered && !pendingSubmit) handleAnswerTap(1); break;
        case '3': if (!isAnswered && !pendingSubmit && !isBinary) handleAnswerTap(2); break;
        case '4': if (!isAnswered && !pendingSubmit && !isBinary) handleAnswerTap(3); break;
        case '5': if (!isAnswered && !pendingSubmit && !isBinary) handleAnswerTap(4); break;
        case 'Escape': if (pendingSubmit) { e.preventDefault(); handleUndo(); } break;
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [activeModal, isAnswered, pendingSubmit, isBinary, currentIndex, goToPrev, goToNext, handleAnswerTap, handleUndo]);
  return (
    <Stack className="flex-1 overflow-hidden no-scrollbar relative">
      {/* Track Selector */}
      <Stack direction="row" align="center" className="h-[68px] flex-shrink-0 px-3 relative z-10" style={{ background: isDark ? 'rgba(17,24,39,0.5)' : 'rgba(255,255,255,0.9)', borderBottom: (() => { const c = colorOf(CAT_COLOR_MAP[currentQuestion?.category]); return `1px solid rgba(${c.rgb},${isDark?0.15:0.20})`; })() }} gap={3}>
        <button onClick={goToPrev} disabled={currentIndex === 0} className="text-xl font-bold w-8 h-8 flex items-center justify-center cursor-pointer"><Text as="span" emphasis={currentIndex === 0 ? "faint" : "secondary"}>◀</Text></button>
        {(() => {
          const ynCount = questions.filter(q => q.type === 'binary' && !responses[q.id]).length;
          const mcCount = questions.filter(q => q.type === 'multiple' && !responses[q.id]).length;
          const allCount = ynCount + mcCount;
          const switchTrack = (newTrack) => {
            const t = selectedTrack === newTrack ? null : newTrack; setSelectedTrack(t);
            if (t && currentQuestion?.type !== t) { const idx = questions.findIndex(q => q.type === t && !responses[q.id]); if (idx >= 0) setCurrentIndex(idx); }
          };
          return (
            <Stack direction="row" align="center" className="flex-1 justify-center" gap={3}>
              <div className={`q-circle q-circle-binary ${selectedTrack === 'binary' ? 'q-circle-current' : 'q-circle-adjacent'}`} onClick={() => switchTrack('binary')}>
                <div className="q-circle-inner" style={{ background: 'var(--bg-main)', color: 'var(--text-primary)' }}>{ynCount > 0 ? 'Y/N' : '✓'}</div>
              </div>
              <div className={`q-circle q-circle-mc ${selectedTrack === 'multiple' ? 'q-circle-current' : 'q-circle-adjacent'}`} onClick={() => switchTrack('multiple')}>
                <div className="q-circle-inner" style={{ background: 'var(--bg-main)', color: 'var(--text-primary)' }}>{mcCount > 0 ? 'ABC' : '✓'}</div>
              </div>
              <div className={`q-circle q-circle-mixed ${!selectedTrack ? 'q-circle-current' : 'q-circle-adjacent'}`} onClick={() => switchTrack(null)}>
                <div className="q-circle-inner" style={{ background: 'var(--bg-main)', color: 'var(--text-primary)' }}>{allCount > 0 ? 'Mix' : '✓'}</div>
              </div>
            </Stack>
          );
        })()}
        <button onClick={goToNext} disabled={!hasNext} className="text-xl font-bold w-8 h-8 flex items-center justify-center cursor-pointer"><Text as="span" emphasis={!hasNext ? "faint" : "secondary"}>▶</Text></button>
      </Stack>
      {/* Judgment subcategory filter chips */}
      {currentQuestion?.category === 'judgment' && (
        <Stack direction="row" align="center" className="px-3 py-1.5 flex-shrink-0 justify-center" gap={2}>
          {[{ id: null, label: 'All' }, { id: 'society', label: 'Society' }, { id: 'taste', label: 'Taste' }, { id: 'calibration', label: 'Calibration' }, { id: 'spicy', label: 'Spicy' }].map(chip => {
            const active = selectedSub === chip.id;
            return <button key={chip.label} onClick={() => {
              const next = active ? null : chip.id;
              setSelectedSub(next);
              if (next && currentQuestion?.sub !== next) { const idx = questions.findIndex(q => q.category === 'judgment' && q.sub === next && !responses[q.id]); if (idx >= 0) setCurrentIndex(idx); }
            }} className={`px-2.5 py-1 rounded-full text-xs font-medium transition-colors cursor-pointer ${active ? 'text-white' : (isDark ? 'text-gray-400 hover:text-gray-200' : 'text-gray-500 hover:text-gray-700')}`}
            style={active ? { background: `linear-gradient(135deg, ${COLOR_HEX.teal.base}, ${COLOR_HEX.teal.light})` } : { background: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)' }}>{chip.label}</button>;
          })}
        </Stack>
      )}
      {isAnswered && !pendingSubmit ? (
        <Stack className="flex-1">
          <Stack className="flex-1 justify-center px-4"><QuestionCard question={currentQuestion} isDark={isDark} evidenceExpanded={evidenceExpanded} onToggleEvidence={() => setEvidenceExpanded(!evidenceExpanded)} /></Stack>
          <div className="flex-shrink-0 px-4 py-6" style={{ background: isDark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)' }}>
            <Text size="xs" emphasis="faint" className="text-center">Already answered · Use arrows to navigate</Text>
          </div>
        </Stack>
      ) : (
        <>
          {/* Question Area */}
          <Stack className="flex-1 justify-center px-4 pb-2 overflow-y-auto no-scrollbar min-h-0 relative">
            <div className="flex-shrink-0">
              <QuestionCard question={currentQuestion} isDark={isDark} evidenceExpanded={evidenceExpanded} onToggleEvidence={() => setEvidenceExpanded(!evidenceExpanded)} />
              {answeredCount < 3 && !isAnswered && <Text size="xxs" emphasis="faint" className="text-center mt-2">{answeredCount === 0 ? "we'll start easy — just tap what feels right" : 'tap more for higher confidence'}</Text>}
              {justUndone && (
                <div className="mt-2">
                  <Stack direction="row" align="center" className="rounded-xl px-4 py-2 justify-between" style={{ ...isDark ? {background: 'rgba(217,119,6,0.15)', border: '1px solid rgba(217,119,6,0.5)'} : {background: 'rgb(254,243,199)', border: '1px solid rgb(252,191,73)'}, backdropFilter: 'blur(12px)' }}>
                    <span className={`text-sm font-bold ${isDark ? 'text-amber-400' : 'text-amber-700'}`}>Undone — tap to change or resubmit</span>
                    <button onClick={clearUndoneState} className="px-3 py-1 rounded-lg text-sm font-medium transition-colors cursor-pointer" style={{ background: 'var(--bg-elevated)', color: 'var(--text-secondary)' }}>Clear</button>
                  </Stack>
                </div>
              )}
              {showTips && showGestureHint && !isAnswered && !pendingSubmit && !justUndone && tappedAnswer === null && (
                <div className="mt-2"><TipBanner isDark={isDark} onDismiss={() => setShowGestureHint(false)} /></div>
              )}
            </div>
            {showConfirmOverlay && (
              <Stack direction="row" align="center" className="absolute bottom-1 left-0 right-0 z-20 justify-center" gap={3}>
                <button onClick={() => { setTappedAnswer(null); setTapCount(0); }} className="w-9 h-9 rounded-full btn-feedback flex items-center justify-center text-sm transition-all cursor-pointer" style={{ background: isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)', color: 'var(--text-muted)', border: '1px solid var(--border-subtle)' }}>✕</button>
                <button onClick={() => submitAnswer()} className="w-11 h-11 rounded-full btn-feedback flex items-center justify-center text-lg transition-all cursor-pointer" style={{ color: isDark ? '#fff' : confirmColor?.base, background: `linear-gradient(135deg, rgba(${confirmColor?.rgb},0.30) 0%, rgba(${confirmColor?.rgb},0.15) 100%)`, border: `1px solid rgba(${confirmColor?.rgb}, 0.50)`, boxShadow: `0 0 18px rgba(${confirmColor?.rgb},0.25), 0 0 40px rgba(${confirmColor?.rgb},0.12)` }}>✓</button>
              </Stack>
            )}
          </Stack>
          {/* Fixed Bottom — Answer Buttons */}
          <div className="flex-shrink-0 border-t relative z-10" style={(() => { const c = colorOf(CAT_COLOR_MAP[currentQuestion?.category]); return { borderColor: `rgba(${c.rgb},${isDark?0.12:0.15})`, background: isDark ? `linear-gradient(180deg, rgba(3,7,18,1) 0%, rgba(${c.rgb},0.04) 100%)` : `linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(${c.rgb},0.04) 100%)` }; })()}>
            <div className="relative">
              <div className="px-4 resp-px pt-3">
                {isBinary ? <BinaryButtons isDark={isDark} tappedAnswer={tappedAnswer} tapCount={tapCount} isAnswered={isAnswered} currentResponse={currentResponse} onTap={handleAnswerTap} onRightClick={handleAnswerRightClick} pendingSubmit={pendingSubmit} category={currentQuestion?.category} undoDelay={undoDelay} onUndo={handleUndo} />
                : <MCButtons options={currentQuestion.options} isDark={isDark} tappedAnswer={tappedAnswer} tapCount={tapCount} isAnswered={isAnswered} currentResponse={currentResponse} onTap={handleAnswerTap} onRightClick={handleAnswerRightClick} pendingSubmit={pendingSubmit} mcColorMode={mcColorMode} undoDelay={undoDelay} onUndo={handleUndo} />}
              </div>
              <Stack direction="row" align="center" className={`relative px-4 mt-3 mb-2 justify-center resp-max-w mx-auto ${isAnswered ? 'invisible' : ''}`}>
                <Stack direction="row" gap={2} className="w-full">
                  {[
                    { label: isBinary ? "Can't" : "None", onClick: () => setActiveModal('cant') },
                    { label: 'Explain', onClick: () => setActiveModal('explain'), active: !!qMeta.explain, activeColor: COLOR_HEX.amber },
                    { label: 'Flag', onClick: () => setActiveModal('flag'), active: !!qMeta.flag, activeColor: COLOR_HEX.rose },
                    { label: 'Skip', onClick: skipQuestion },
                    { label: savedQuestions?.has(currentQuestion?.id) ? '✓ Saved' : 'Save', onClick: saveForLater, active: savedQuestions?.has(currentQuestion?.id), activeColor: COLOR_HEX.violet },
                  ].map(btn => (
                    <button key={btn.label} onClick={btn.onClick} disabled={isAnswered || !!pendingSubmit}
                      className="flex-1 resp-h-sm rounded-xl resp-text-sm font-medium transition-all btn-feedback border cursor-pointer"
                      style={btn.active ? { borderColor: `rgba(${btn.activeColor.rgb}, 0.30)`, background: `rgba(${btn.activeColor.rgb}, 0.08)`, color: btn.activeColor.light }
                      : { borderColor: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.10)', background: isDark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.04)', color: COLOR_HEX.gray.base }}>
                      {btn.label}
                    </button>
                  ))}
                </Stack>
              </Stack>
            </div>
            <div className="px-4 pb-3 pt-1">
              <Text size="xs" emphasis="faint" className="text-center">Swipe for next →</Text>
            </div>
          </div>
        </>
      )}
      {/* Action modals */}
      {activeModal === 'flag' && <ActionSheet {...Q_MODAL_FLAG} existing={qMeta.flag} onSubmit={(v) => setQuestionMeta(m => ({ ...m, [currentQuestion.id]: { ...m[currentQuestion.id], flag: v } }))} onClear={() => setQuestionMeta(m => ({ ...m, [currentQuestion.id]: { ...m[currentQuestion.id], flag: undefined } }))} onClose={() => setActiveModal(null)} />}
      {activeModal === 'explain' && <ActionSheet {...Q_MODAL_EXPLAIN} existing={qMeta.explain} onSubmit={(v) => setQuestionMeta(m => ({ ...m, [currentQuestion.id]: { ...m[currentQuestion.id], explain: v } }))} onClear={() => setQuestionMeta(m => ({ ...m, [currentQuestion.id]: { ...m[currentQuestion.id], explain: undefined } }))} onClose={() => setActiveModal(null)} />}
      {activeModal === 'cant' && <ActionSheet {...Q_MODAL_CANT} onSubmit={(v) => { setQuestionMeta(m => ({ ...m, [currentQuestion.id]: { ...m[currentQuestion.id], cant: v } })); skipQuestion(); }} onClose={() => setActiveModal(null)} />}
    </Stack>
  );
};

// — DEV + ROUTING HELPERS
const IS_DEV = ['localhost', '127.0.0.1', ''].includes(location.hostname) || location.protocol === 'file:';
const getInitialScreen = () => {
  try {
    const params = new URLSearchParams(window.location.search);
    // Handle OAuth error redirect
    const oauthError = params.get('error_description') || new URLSearchParams(window.location.hash.slice(1)).get('error_description');
    if (oauthError) {
      const msg = oauthError.includes('identity_already_exists')
        ? 'That account is already linked to a different user.'
        : `Link failed: ${oauthError.replace(/\+/g, ' ')}`;
      setTimeout(() => window.__auraToast?.(msg), 500);
      window.history.replaceState({}, '', window.location.pathname);
      const returnScreen = sessionStorage.getItem('aura-return-screen');
      if (returnScreen) { sessionStorage.removeItem('aura-return-screen'); return returnScreen; }
    }
    if (params.get('c') || params.get('compare')) return 'compare';
    if (params.get('p')) return 'public-profile';
  } catch {}
  // Return to settings after OAuth redirect
  const returnScreen = sessionStorage.getItem('aura-return-screen');
  if (returnScreen) { sessionStorage.removeItem('aura-return-screen'); return returnScreen; }
  const onboarded = localStorage.getItem(ONBOARD_STORAGE_KEY);
  if (onboarded) return 'categories';
  // First visit — show entity gate if not yet declared
  try { if (!localStorage.getItem(ENTITY_GATE_KEY)) return 'entity-gate'; } catch {}
  return 'landing';
};

const ASSESS_CATEGORY_ORDER = ['quickstart', 'starter', 'personality', 'shadow', 'drive', 'mind', 'relationships', 'character', 'behavior', 'wellbeing', 'clinical'];

Object.entries(ASSESS_CATEGORIES).forEach(([catId, cat]) => { cat.tests.forEach(testId => { ASSESS_TEST_TO_CATEGORY[testId] = catId; }); });
const ASSESS_VERSION = 2;

// Branch unlock mapping: starter module → branch it unlocks
const ASSESS_BRANCH_MAP = {
  'starter-personality': 'personality',
  'starter-motivation': 'drive',
  'starter-thinking': 'cognition',
  'starter-connection': 'social',
  'starter-strategy': 'action',
  'starter-wellbeing': 'wellness',
};

const calculateAssessUnlocks = (completed) => {
  const unlocks = { tier: 0, branches: {} };
  if (!completed) return unlocks;
  if (completed['quick-profile'] || completed['ai-style'] || completed['ai-self'] || completed['ai-values'] || completed['ai-vision']) unlocks.tier = 1;
  // Flat unlock: ALL starters complete → tier 2, all branches open at once
  const allStarters = Object.keys(ASSESS_BRANCH_MAP);
  if (allStarters.every(id => completed[id])) {
    unlocks.tier = 2;
    for (const branchId of Object.values(ASSESS_BRANCH_MAP)) unlocks.branches[branchId] = true;
  }
  // Shadow requires 3+ of 5 Big Five completed
  const bigFiveCount = ['bigfive-E', 'bigfive-A', 'bigfive-C', 'bigfive-N', 'bigfive-O'].filter(id => completed[id]).length;
  if (bigFiveCount >= 3) unlocks.branches.shadow = true;
  return unlocks;
};
// Backward-compatible wrapper
const calculateAssessTier = (completed) => calculateAssessUnlocks(completed).tier;

const getFeatureTier = (assessCompleted, isLoggedIn) => {
  const c = Object.keys(assessCompleted || {}).length;
  if (c >= 5 || isLoggedIn) return 3; if (c >= 3) return 2; if (c >= 1) return 1; return 0;
};
// Category status — branch-aware
const getCategoryStatus = (catId, assessCompleted, assessInProgress, tier, unlocks) => {
  const cat = ASSESS_CATEGORIES[catId];
  if (!cat) return 'locked';
  if ((cat.tier || 0) > tier) return 'locked';
  // Branch gate — use pre-computed unlocks if provided
  if (cat.branch) { const u = unlocks || calculateAssessUnlocks(assessCompleted); if (!u.branches[cat.branch]) return 'locked'; }
  if (cat.requires && !cat.requires.every(id => assessCompleted[id])) return 'locked';
  const catTests = cat.tests.filter(id => ASSESS_TESTS[id] && !ASSESS_TESTS[id].archived);
  if (catTests.every(id => assessCompleted[id])) return 'done';
  if (catTests.some(id => assessCompleted[id] || assessInProgress?.[id])) return 'in-progress';
  return 'available';
};
const getCompletedCategoryCount = (assessCompleted, entityType) => {
  let count = 0;
  for (const [_, cat] of Object.entries(ASSESS_CATEGORIES)) {
    if (cat.entityHint && cat.entityHint !== entityType) continue;
    const ct = cat.tests.filter(id => ASSESS_TESTS[id] && !ASSESS_TESTS[id].archived);
    if (ct.length > 0 && ct.every(id => assessCompleted[id])) count++;
  }
  return count;
};

const getAssessNudge = (completedTestId, newCompleted, entityType) => {
  const fromCatId = ASSESS_TEST_TO_CATEGORY[completedTestId];
  if (!fromCatId) return null;
  const fromCat = ASSESS_CATEGORIES[fromCatId];
  const nextInCategory = fromCat.tests.find(id => !newCompleted[id] && ASSESS_TESTS[id] && !ASSESS_TESTS[id].archived);
  if (nextInCategory) return { type: 'same-category', toCatId: fromCatId, toCategory: fromCat, nextTestId: nextInCategory };
  const tier = calculateAssessTier(newCompleted);
  const recommendations = [];
  for (const catId of ASSESS_CATEGORY_ORDER) {
    if (catId === fromCatId) continue;
    const cat = ASSESS_CATEGORIES[catId];
    if (!cat || (cat.tier || 0) > tier) continue;
    if (cat.entityHint && cat.entityHint !== entityType) continue;
    const nextTestId = cat.tests.find(id => !newCompleted[id] && ASSESS_TESTS[id] && !ASSESS_TESTS[id].archived);
    if (!nextTestId) continue;
    const message = ASSESS_NUDGE_COPY[`${fromCatId}-${catId}`] || ASSESS_NUDGE_COPY[`_${catId}`] || "Continue your journey.";
    recommendations.push({ toCatId: catId, toCategory: cat, nextTestId, message });
    if (recommendations.length >= 2) break;
  }
  if (recommendations.length === 0) return null;
  const primary = recommendations[0];
  return { type: 'next-category', toCatId: primary.toCatId, toCategory: primary.toCategory, nextTestId: primary.nextTestId, message: primary.message, recommendations };
};

const PROGRESS_GRADIENTS = Object.fromEntries(Object.entries(COLOR_HEX).map(([c, hex]) => [c, { from: hex.base, to: hex.light }]));

// — PROGRESS CIRCLE
const ProgressCircle = ({ progress = 0, size = 48, strokeWidth = 3, color = 'violet', icon = null, text = null, gradientId = 'prog', isDark = true, glow = true, iconSize = 'text-lg', textSize = 'text-sm', onClick = null }) => {
  const radius = (size - strokeWidth) / 2;
  const circumference = 2 * Math.PI * radius;
  const grad = PROGRESS_GRADIENTS[color] || PROGRESS_GRADIENTS.violet;
  const hasProgress = progress > 0;
  return (
    <div className={`relative flex items-center justify-center ${onClick ? 'cursor-pointer hover:scale-110 transition-transform' : ''}`} style={{ width: size, height: size }} onClick={onClick}>
      {glow && hasProgress && <div className="absolute rounded-full pointer-events-none" style={{ inset: -Math.round(size * 0.25), background: `radial-gradient(circle, ${grad.from}40 0%, ${grad.from}15 45%, transparent 70%)` }} />}
      <svg width={size} height={size} className="absolute">
        <defs><linearGradient id={gradientId} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={hasProgress ? grad.from : '#374151'} /><stop offset="100%" stopColor={hasProgress ? grad.to : '#4b5563'} /></linearGradient></defs>
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={isDark ? '#1f2937' : '#e5e7eb'} strokeWidth={strokeWidth} />
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={`url(#${gradientId})`} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={circumference * (1 - progress / 100)} transform={`rotate(-90 ${size/2} ${size/2})`} className="transition-all duration-500" />
      </svg>
      {icon && !text && <span className={`relative z-10 ${iconSize}`}>{icon}</span>}
      {text !== null && <span className={`relative z-10 font-bold ${textSize}`} style={{ color: hasProgress ? grad.to : (isDark ? COLOR_HEX.gray.base : COLOR_HEX.gray.light) }}>{text}</span>}
    </div>
  );
};

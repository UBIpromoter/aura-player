const useAssessment = ({ setScreen, isDark, entityType, cloudSync, responseCapture }) => {
  const [assessCurrentTestId, setAssessCurrentTestId] = useState(null);
  const [assessCurrentIndex, setAssessCurrentIndex] = useState(0);
  const [assessEntering, setAssessEntering] = useState(false);
  const [assessResponses, setAssessResponses] = useState({});
  const [assessSkipped, setAssessSkipped] = useState([]);
  const [assessInitData] = useState(() => { try { const s = localStorage.getItem(ASSESS_STORAGE_KEY); if (!s) return { completed: {}, inProgress: {}, migrated: false }; const d = JSON.parse(s); if (d.assessVersion !== ASSESS_VERSION) { localStorage.setItem(ASSESS_STORAGE_KEY, JSON.stringify({ assessVersion: ASSESS_VERSION, completed: {}, inProgress: {} })); return { completed: {}, inProgress: {}, migrated: !!Object.keys(d.completed || {}).length }; } return { completed: d.completed || {}, inProgress: d.inProgress || {}, migrated: false }; } catch { return { completed: {}, inProgress: {}, migrated: false }; } });
  const [assessCompleted, setAssessCompleted] = useState(assessInitData.completed);
  const [assessInProgress, setAssessInProgress] = useState(assessInitData.inProgress);
  const [assessPending, setAssessPending] = useState(null);
  const [assessShowCompletion, setAssessShowCompletion] = useState(false);
  const [assessShowDemoMenu, setAssessShowDemoMenu] = useState(false);
  const [assessShowExitConfirm, setAssessShowExitConfirm] = useState(false);
  const [assessExpandedCategory, setAssessExpandedCategory] = useState(null);
  const [assessDemoActive, setAssessDemoActive] = useState(() => { try { const s = localStorage.getItem(ASSESS_STORAGE_KEY); return s ? JSON.parse(s).demoActive || false : false; } catch { return false; } });
  const [assessDemoProfile, setAssessDemoProfile] = useState(() => { try { const s = localStorage.getItem(ASSESS_STORAGE_KEY); const p = s ? JSON.parse(s).demoProfile : null; return p != null ? Number(p) : null; } catch { return null; } });
  const [showDemoControls, setShowDemoControls] = useState(() => { try { const s = localStorage.getItem(ASSESS_STORAGE_KEY); return s ? JSON.parse(s).showDemoControls || false : false; } catch { return false; } });
  const [assessSavedUserData, setAssessSavedUserData] = useState(() => { try { const s = localStorage.getItem(ASSESS_STORAGE_KEY); return s ? JSON.parse(s).savedUserData || null : null; } catch { return null; } });
  const [assessShowDemoInfo, setAssessShowDemoInfo] = useState(false);
  const [assessProfileSwitching, setAssessProfileSwitching] = useState(false);
  const assessTimeoutRef = useRef(null);
  const [assessShowUndoToast, setAssessShowUndoToast] = useState(false);
  const [assessUnlockMessage, setAssessUnlockMessage] = useState(null);
  const [assessNudgeData, setAssessNudgeData] = useState(null);
  const [assessShowCrisisResources, setAssessShowCrisisResources] = useState(false);
  const [assessClinicalConsent, setAssessClinicalConsent] = useState(() => { try { return localStorage.getItem('aura-clinical-consent') === 'true'; } catch { return false; } });
  // V2 migration toast
  useEffect(() => { if (assessInitData.migrated) { setAssessUnlockMessage('Assessment system updated — your progress has been reset'); setTimeout(() => setAssessUnlockMessage(null), 4000); } }, []);
  const assessSaveToStorage = (completed, progress, demoActive = assessDemoActive, savedUserData = assessSavedUserData, demoProfile = assessDemoProfile, demoControls = showDemoControls) => {
    localStorage.setItem(ASSESS_STORAGE_KEY, JSON.stringify({ assessVersion: ASSESS_VERSION, completed, inProgress: progress, demoActive, savedUserData, demoProfile, showDemoControls: demoControls }));
  };

  const assessCurrentTest = assessCurrentTestId ? ASSESS_TESTS[assessCurrentTestId] : null;
  const assessTestColor = assessCurrentTest ? getAssessColor(assessCurrentTest.color, isDark) : null;
  const assessCurrentScale = assessCurrentTest ? (ASSESS_SCALES ? ASSESS_SCALES[assessCurrentTest.scale] : null) : null;
  // Gateway branching
  const assessGatewayActiveItems = useMemo(() => {
    if (!assessCurrentTest || assessCurrentTest.scale !== 'gateway') return null;
    const branchKey = assessResponses[0] != null ? assessResponses[0] - 1 : null;
    return assessCurrentTest.items.reduce((acc, item, i) => {
      if (!item.branchIf) { acc.push(i); return acc; }
      const [bKey, bVal] = Object.entries(item.branchIf)[0];
      if (branchKey === null) { if (bVal === 0) acc.push(i); }
      else { if (bKey === 'energy' && branchKey === bVal) acc.push(i); }
      return acc;
    }, []);
  }, [assessCurrentTest, assessResponses[0]]);
  const assessTotalQuestions = assessGatewayActiveItems ? assessGatewayActiveItems.length : (assessCurrentTest?.items.length || 0);
  const assessGoToQuestion = (index) => {
    setAssessEntering(false);
    setAssessCurrentIndex(index);
    setAssessPending(null);
    requestAnimationFrame(() => setAssessEntering(true));
    setTimeout(() => setAssessEntering(false), 1700);
  };

  const getGatewayActive = (resp) => {
    if (!assessCurrentTest || assessCurrentTest.scale !== 'gateway') return null;
    const branchKey = resp[0] != null ? resp[0] - 1 : null;
    return assessCurrentTest.items.reduce((acc, item, i) => {
      if (!item.branchIf) { acc.push(i); return acc; }
      const [bKey, bVal] = Object.entries(item.branchIf)[0];
      if (branchKey === null) { if (bVal === 0) acc.push(i); }
      else { if (bKey === 'energy' && branchKey === bVal) acc.push(i); }
      return acc;
    }, []);
  };

  const assessCompleteTest = (resp) => {
    const results = calculateAssessResults(assessCurrentTestId, resp);
    const newCompleted = { ...assessCompleted, [assessCurrentTestId]: results };
    setAssessCompleted(newCompleted);
    const { [assessCurrentTestId]: _, ...remainingProgress } = assessInProgress;
    setAssessInProgress(remainingProgress);
    assessSaveToStorage(newCompleted, remainingProgress);
    // Cloud sync (fire-and-forget)
    cloudSync?.saveCompleted(assessCurrentTestId, resp, results);
    const prevTier = calculateAssessTier(assessCompleted);
    const newTier = calculateAssessTier(newCompleted);
    if (newTier > prevTier && newTier === 1) {
      setAssessUnlockMessage({ title: "Starter Pack Unlocked!", subtitle: "Begin your deep dive into self-discovery" });
    }
    // Branch unlock — name the specific branch, not "all"
    const prevUnlocks = calculateAssessUnlocks(assessCompleted);
    const newUnlocks = calculateAssessUnlocks(newCompleted);
    const newBranches = Object.keys(newUnlocks.branches).filter(b => newUnlocks.branches[b] && !prevUnlocks.branches[b]);
    if (newBranches.length > 1) {
      setAssessUnlockMessage({ title: '🔓 All Branches Unlocked!', subtitle: 'Your full assessment journey is open' });
    } else if (newBranches.length === 1) {
      const branchInfo = ASSESS_BRANCHES.find(b => b.id === newBranches[0]);
      setAssessUnlockMessage({ title: `${branchInfo?.icon || '🔓'} ${branchInfo?.name || 'New Branch'} Unlocked!`, subtitle: `You can now explore ${branchInfo?.name || 'new assessments'}` });
    }
    setAssessShowCompletion(true);
    haptic(HAPTIC.complete);
    setAssessNudgeData(getAssessNudge(assessCurrentTestId, newCompleted, entityType));
    setTimeout(() => { setAssessShowCompletion(false); setAssessUnlockMessage(null); setScreen('assess-results'); }, assessCurrentTestId === 'quick-profile' ? 1400 : 900);
  };

  const assessAdvanceToNext = (resp, skipped) => {
    const gwActive = getGatewayActive(resp);
    if (gwActive) {
      if (gwActive.filter(ri => resp[ri] !== undefined).length >= gwActive.length) { assessCompleteTest(resp); return; }
      for (let vi = assessCurrentIndex + 1; vi < gwActive.length; vi++) { if (resp[gwActive[vi]] === undefined) { assessGoToQuestion(vi); return; } }
      for (let vi = 0; vi < assessCurrentIndex; vi++) { if (resp[gwActive[vi]] === undefined) { assessGoToQuestion(vi); return; } }
      return;
    }
    const total = assessCurrentTest.items.length;
    if (Object.keys(resp).length >= total) { assessCompleteTest(resp); return; }
    for (let i = assessCurrentIndex + 1; i < total; i++) { if (resp[i] === undefined) { assessGoToQuestion(i); return; } }
    for (let i = 0; i < assessCurrentIndex; i++) { if (resp[i] === undefined) { assessGoToQuestion(i); return; } }
  };

  const [assessPendingClinicalTest, setAssessPendingClinicalTest] = useState(null);
  const assessStartTest = (testId) => {
    const catId = ASSESS_TEST_TO_CATEGORY[testId];
    const cat = catId ? ASSESS_CATEGORIES[catId] : null;
    // Branch lock enforcement — silently refuse if branch not unlocked
    if (cat?.branch) {
      const u = calculateAssessUnlocks(assessCompleted);
      if (!u.branches[cat.branch]) return;
    }
    // Clinical consent gate
    if (cat?.requiresConsent && !assessClinicalConsent) {
      setAssessPendingClinicalTest(testId);
      setScreen('clinical-consent');
      return;
    }
    setAssessCurrentTestId(testId);
    const progress = assessInProgress[testId];
    setAssessCurrentIndex(progress?.index || 0);
    setAssessResponses(progress?.responses || {});
    setAssessSkipped(progress?.skipped || []);
    setAssessPending(null);
    setAssessShowCrisisResources(false);
    setScreen('assess-question');
  };
  const assessConfirmClinicalConsent = () => {
    setAssessClinicalConsent(true);
    try { localStorage.setItem('aura-clinical-consent', 'true'); } catch {}
    if (assessPendingClinicalTest) { assessStartTest(assessPendingClinicalTest); setAssessPendingClinicalTest(null); }
  };
  const assessSaveAndExit = () => {
    clearTimeout(assessTimeoutRef.current);
    const progressObj = { index: assessCurrentIndex, responses: assessResponses, skipped: assessSkipped };
    const newProgress = { ...assessInProgress, [assessCurrentTestId]: progressObj };
    setAssessInProgress(newProgress);
    assessSaveToStorage(assessCompleted, newProgress);
    cloudSync?.saveProgress(assessCurrentTestId, progressObj);
    setScreen('assess-picker');
  };
  const assessDiscardAndExit = () => {
    clearTimeout(assessTimeoutRef.current);
    setScreen('assess-picker');
  };
  const assessFinalizeSubmit = (value) => {
    const gwActive = assessGatewayActiveItems;
    const rawIdx = gwActive ? gwActive[assessCurrentIndex] : assessCurrentIndex;
    const newResponses = { ...assessResponses, [rawIdx]: value };
    setAssessResponses(newResponses);
    const newSkipped = assessSkipped.filter(i => i !== rawIdx);
    setAssessSkipped(newSkipped);
    setAssessPending(null);
    // Cloud response capture (fire-and-forget)
    const test = assessCurrentTestId ? ASSESS_TESTS[assessCurrentTestId] : null;
    const item = test?.items?.[rawIdx];
    responseCapture?.captureAssessResponse(assessCurrentTestId, rawIdx, value, test && item ? { test: assessCurrentTestId, name: test.name, q: item.q, idx: rawIdx } : null);
    // PHQ-9 safety: show crisis resources if suicidality item (index 8) endorsed
    // PHQ-9 safety: one-way trigger — once shown, persists until dismissed or test exits.
    // Intentionally does not re-evaluate on answer change (safe default).
    if (assessCurrentTestId === 'phq9' && rawIdx === 8 && value > 1) setAssessShowCrisisResources(true);
    assessAdvanceToNext(newResponses, newSkipped);
  };
  const assessHandleAnswerTap = (value) => { assessFinalizeSubmit(value); };
  const assessHandleUndo = () => { clearTimeout(assessTimeoutRef.current); setAssessPending(null); setAssessShowUndoToast(true); setTimeout(() => setAssessShowUndoToast(false), 1000); };
  const assessCanFinish = () => {
    if (!assessCurrentTest) return false;
    if (assessGatewayActiveItems) return assessGatewayActiveItems.every(ri => assessResponses[ri] !== undefined);
    return Object.keys(assessResponses).length >= assessCurrentTest.items.length;
  };
  const assessFinishAssessment = () => { if (assessCanFinish()) assessCompleteTest(assessResponses); };
  const assessLoadDemoProfile = (profileNum) => {
    const savedData = !assessDemoActive ? { completed: { ...assessCompleted }, inProgress: { ...assessInProgress } } : assessSavedUserData;
    if (!assessDemoActive) setAssessSavedUserData(savedData);
    const profile = ASSESS_DEMO_PROFILES[profileNum];
    const skipList = profile.skip || [];
    const newCompleted = {};
    Object.keys(ASSESS_TESTS).forEach(testId => {
      if (skipList.includes(testId)) return;
      const test = ASSESS_TESTS[testId];
      const answers = {};
      if (test.parent === 'bigfive') { const d = profile.bigfive?.[test.trait]; if (d) d.forEach((v, i) => { answers[i] = v; }); else return; }
      else if (test.parent === 'shadow') { const d = profile.shadow?.[test.trait]; if (d) d.forEach((v, i) => { answers[i] = v; }); else return; }
      else if (profile[testId]) { if (Array.isArray(profile[testId])) profile[testId].forEach((v, i) => { answers[i] = v; }); else Object.entries(profile[testId]).forEach(([k, v]) => { answers[parseInt(k)] = v; }); }
      else return;
      newCompleted[testId] = calculateAssessResults(testId, answers);
    });
    setAssessCompleted(newCompleted); setAssessInProgress({}); setAssessDemoActive(true); setAssessDemoProfile(profileNum);
    assessSaveToStorage(newCompleted, {}, true, savedData, profileNum);
    setAssessShowDemoMenu(false); setAssessProfileSwitching(true); setTimeout(() => setAssessProfileSwitching(false), 600);
  };
  const assessClearDemo = () => {
    if (assessSavedUserData) { setAssessCompleted(assessSavedUserData.completed); setAssessInProgress(assessSavedUserData.inProgress); assessSaveToStorage(assessSavedUserData.completed, assessSavedUserData.inProgress, false, null, null); }
    else { setAssessCompleted({}); setAssessInProgress({}); assessSaveToStorage({}, {}, false, null, null); }
    setAssessDemoActive(false); setAssessDemoProfile(null); setAssessSavedUserData(null); setAssessProfileSwitching(true); setTimeout(() => setAssessProfileSwitching(false), 600);
  };
  const assessClearAll = () => {
    setAssessCompleted({}); setAssessInProgress({}); setAssessDemoActive(false); setAssessSavedUserData(null);
    assessSaveToStorage({}, {}, false, null); setAssessShowDemoMenu(false);
    cloudSync?.clearAll();
  };

  // Split into 3 focused interfaces: state (data), actions (mutations), ui (presentation)
  const assessState = {
    assessCompleted, setAssessCompleted, assessInProgress, setAssessInProgress,

    assessCurrentScale, assessTotalQuestions, assessGatewayActiveItems, assessTestColor,
    assessDemoActive, assessDemoProfile, showDemoControls, setShowDemoControls,
    assessSavedUserData, assessExpandedCategory, setAssessExpandedCategory,
    assessClinicalConsent, assessPendingClinicalTest, assessNudgeData,

  const assessActions = {

    assessFinalizeSubmit, assessCanFinish, assessFinishAssessment,
    assessConfirmClinicalConsent,

  const assessUI = {

    assessShowDemoMenu, setAssessShowDemoMenu,

  };
  return { assessState, assessActions, assessUI };
};

// — ASSESSMENT PICKER SCREEN
const AssessCategoryCard = ({ catId, cat, catTests, isDark, assessCompleted, assessInProgress, assessExpandedCategory, setAssessExpandedCategory, assessStartTest, status }) => {
  const isLocked = status === 'locked';
  const totalQ = catTests.reduce((s, [_, t]) => s + (t.questionCount || t.items.length), 0);
  const answeredQ = catTests.reduce((s, [id, t]) => { if (assessCompleted[id]) return s + (t.questionCount || t.items.length); const p = assessInProgress[id]; return s + (p ? Object.keys(p.responses || {}).length : 0); }, 0);
  const pct = isLocked ? 0 : (answeredQ / totalQ) * 100;
  const t = twColor(cat.color);
  const isExpanded = !isLocked && assessExpandedCategory === catId;
  const hasModules = catTests.length > 1;
  const handleClick = () => {
    if (isLocked) return;
    if (hasModules) { setAssessExpandedCategory(isExpanded ? null : catId); }
    else if (catTests[0]) { assessStartTest(catTests[0][0]); }
  };
  return (
    <div>
      <button onClick={handleClick} className={`w-full p-3 rounded-xl text-left flex items-center gap-3 transition-all border ${isLocked ? 'opacity-50 cursor-not-allowed' : ''} ${isDark ? 'border-white/[0.06] bg-white/[0.03] hover:bg-white/[0.06]' : 'border-black/[0.06] bg-white hover:bg-gray-50'}`}>
        <ProgressCircle progress={pct} size={40} strokeWidth={3} color={cat.color} text={isLocked ? '🔒' : (pct > 0 ? `${Math.round(pct)}%` : cat.icon)} gradientId={`cat-${catId}`} isDark={isDark} textSize="text-[10px]" iconSize="text-sm" />
        <div className="flex-1 min-w-0">
          <Text weight="medium">{cat.name}</Text>
          {isLocked ? <Text size="xxs" emphasis="faint">Complete the starter to unlock</Text> : <Text size="xxs" emphasis="subtle">{catTests.length} module{catTests.length > 1 ? 's' : ''} · {totalQ} questions</Text>}
        </div>
        {!isLocked && hasModules && <Text as="span" size="xxs" emphasis="faint">{isExpanded ? '▾' : '▸'}</Text>}
      </button>
      {isExpanded && hasModules && (
        <div className="ml-6 mt-1 space-y-1">
          {catTests.map(([testId, test]) => {
            const result = assessCompleted[testId];
            const inProg = !!assessInProgress[testId];
            const spec = spectrumColors[testId];
            const hasSpectrum = result && spec && result.score !== undefined;
            const isLocked = test.requires && !assessCompleted[test.requires];
            return (
              <button key={testId} onClick={() => !isLocked && assessStartTest(testId)} className={`w-full p-2.5 rounded-lg text-left flex items-center gap-2.5 text-sm transition-all ${isLocked ? 'opacity-40 cursor-not-allowed' : ''} ${isDark ? 'hover:bg-white/[0.04]' : 'hover:bg-gray-50'}`}>
                <span className={`flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center text-[10px] ${result ? `bg-${t}-500 text-white` : inProg ? `bg-${t}-500/20 text-${t}-400` : (isDark ? 'bg-white/[0.06] text-gray-500' : 'bg-gray-200 text-gray-400')}`}>{result ? '✓' : test.icon}</span>
                <Text as="span" emphasis={result ? 'subtle' : 'primary'} className={hasSpectrum ? 'w-24 truncate flex-shrink-0' : 'flex-1'}>{test.name}</Text>
                {hasSpectrum && <div className="flex-1 min-w-0"><SpectrumBar value={result.score} leftColor={spec.left} rightColor={spec.right} size="sm" /></div>}
                {!result && !inProg && !isLocked && <Text as="span" size="xxs" weight="medium" className={`ml-auto flex-shrink-0 text-${t}-400`}>Start →</Text>}
                {!result && isLocked && <Text as="span" size="xxs" emphasis="faint" className="ml-auto flex-shrink-0">🔒</Text>}
                {inProg && <Text as="span" size="xxs" emphasis="faint" className="ml-auto flex-shrink-0">in progress</Text>}

        </div>
      )}
    </div>
  );
};

const ProfileCategoryList = ({ assessCompleted, entityType, currentTier, onStart }) => {
  const available = [], completed = [];
  for (const catId of ASSESS_CATEGORY_ORDER) {
    const cat = ASSESS_CATEGORIES[catId];
    if (!cat || (cat.entityHint && cat.entityHint !== entityType) || (cat.tier || 0) > currentTier) continue;
    const catTests = cat.tests.filter(id => ASSESS_TESTS[id] && !ASSESS_TESTS[id].archived);
    const allDone = catTests.every(id => assessCompleted[id]);
    const doneCount = catTests.filter(id => assessCompleted[id]).length;
    const firstIncomplete = catTests.find(id => !assessCompleted[id]);
    if (allDone) completed.push({ catId, cat });
    else available.push({ catId, cat, catTests, doneCount, firstIncomplete });
  }
  return (
    <Stack gap={2}>
      {available.length > 0 && <>
        <Text size="sm" weight="medium" emphasis="subtle" className="uppercase tracking-wide">Available</Text>
        {available.map(({ catId, cat, catTests, doneCount, firstIncomplete }) => (
          <ListItem key={catId} icon={cat.icon} label={cat.name} color={cat.color}
            action={doneCount > 0 ? <span className="text-xs px-2.5 py-0.5 rounded-full" style={{ background: `rgba(${colorOf(cat.color).rgb},0.15)`, color: colorOf(cat.color).light }}>{doneCount}/{catTests.length}</span> : undefined}

        ))}
      </>}
      {completed.length > 0 && <>
        <Text size="sm" weight="medium" emphasis="subtle" className="uppercase tracking-wide mt-3">Completed</Text>
        {completed.map(({ catId, cat }) => <ListItem key={catId} icon={cat.icon} label={cat.name} color={cat.color} completed />)}

};

const getQPSummary = (completed) => {
  const qp = completed['quick-profile'];
  if (!qp) return null;
  const responses = qp.responses || {};
  const traits = { E: 0, C: 0, A: 0, N: 0, O: 0 };
  const counts = { E: 0, C: 0, A: 0, N: 0, O: 0 };
  Object.entries(responses).forEach(([idx, value]) => {
    const item = ASSESS_TESTS['quick-profile'].items[parseInt(idx)];
    if (item?.c && traits[item.c] !== undefined) { traits[item.c] += item.k === '+' ? value : (6 - value); counts[item.c]++; }
  });
  const normalized = {};
  Object.keys(traits).forEach(t => { if (counts[t] > 0) normalized[t] = Math.round((traits[t] / (counts[t] * 5)) * 100); });
  const phrases = [];
  if (normalized.E >= 60) phrases.push('outgoing and energized by people');
  else if (normalized.E <= 40) phrases.push('reserved and thoughtful');
  if (normalized.C >= 60) phrases.push('organized and reliable');
  else if (normalized.C <= 40) phrases.push('flexible and spontaneous');
  if (normalized.A >= 60) phrases.push('empathetic');
  else if (normalized.A <= 40) phrases.push('direct and honest');
  if (normalized.N >= 60) phrases.push('reflective');
  if (normalized.O >= 60) phrases.push('curious and open-minded');
  return { traits: normalized, summary: phrases.length > 0 ? `You're ${phrases.slice(0, 3).join(', ')}.` : 'Complete more questions for a fuller picture.' };
};

const getBigFiveFromCompleted = (completed) => {
  const scores = {};
  ['E', 'A', 'C', 'N', 'O'].forEach(t => { if (completed[`bigfive-${t}`]) scores[t] = completed[`bigfive-${t}`].score; });
  return scores;
};

    if (bigFive.N > 60 && completed.risk.score < 40) ins.push({ icon: '🛡️', text: 'Your sensitivity combined with caution helps you avoid regrettable decisions' });
    if (bigFive.E > 60 && completed.risk.score > 50) ins.push({ icon: '🌟', text: 'Outgoing nature + willingness to take risks = natural leadership qualities' });
    if (bigFive.C > 70 && completed.risk.score < 40) ins.push({ icon: '📊', text: 'High conscientiousness + low risk tolerance = methodical planner who values stability' });
  }
  if (completed.attachment && hasBF) {
    if (completed.attachment.style === 'Anxious' && bigFive.N > 50) ins.push({ icon: '💭', text: 'Your emotional sensitivity may intensify relationship concerns' });
    if (completed.attachment.style === 'Avoidant' && bigFive.E < 40) ins.push({ icon: '🏠', text: 'You recharge alone and maintain independence in relationships' });
    if (completed.attachment.style === 'Secure' && bigFive.A > 50) ins.push({ icon: '💚', text: 'Secure attachment + agreeableness = strong relationship foundation' });
  }
  if (completed.adhd && hasBF) {
    if (completed.adhd.indicators >= 3 && bigFive.C < 40) ins.push({ icon: '⚡', text: 'ADHD traits align with your flexible, spontaneous approach' });
    if (completed.adhd.indicators >= 3 && bigFive.O > 60) ins.push({ icon: '💡', text: 'High openness + ADHD traits may fuel creative bursts' });
  }
  if (completed.cognitive && hasBF) {
    if (completed.cognitive.score > 60 && bigFive.C > 60) ins.push({ icon: '🧩', text: 'ND traits + conscientiousness = detail-oriented systematic thinker' });
    if (completed.cognitive.score > 60 && bigFive.O > 60) ins.push({ icon: '🔮', text: 'ND traits + openness can create unique, unconventional perspectives' });
  }
  if (hasBF) {
    if (bigFive.E > 60 && bigFive.A > 60) ins.push({ icon: '☀️', text: 'High extraversion + agreeableness = warm, approachable social presence' });
    if (bigFive.N > 60 && bigFive.O > 60) ins.push({ icon: '🎨', text: 'Emotional depth + openness often fuels artistic or creative expression' });
    if (bigFive.C > 70 && bigFive.N < 40) ins.push({ icon: '⚓', text: 'High conscientiousness + emotional stability = calm under pressure' });
    if (bigFive.E < 40 && bigFive.O > 60) ins.push({ icon: '📚', text: 'Introversion + openness suggests rich inner life and deep interests' });
  }
  const shadowM = completed['shadow-M']?.score, shadowN = completed['shadow-N']?.score, shadowP = completed['shadow-P']?.score;
  if (shadowM > 70 && hasBF && bigFive.C > 60) ins.push({ icon: '♟️', text: 'Strategic thinking + conscientiousness = patient, long-term planner' });
  if (shadowN > 70 && hasBF && bigFive.E > 60) ins.push({ icon: '👑', text: 'High self-regard + extraversion = natural performer who commands attention' });
  if (shadowP > 60 && hasBF && bigFive.N < 40) ins.push({ icon: '🧊', text: 'Emotional detachment + stability = calm decision-maker in crisis situations' });
  if (completed.chronotype) {
    if (completed.chronotype.type === 'Morning Lark' && hasBF && bigFive.C > 60) ins.push({ icon: '🌅', text: 'Morning energy + conscientiousness = you conquer your day before others wake' });
    if (completed.chronotype.type === 'Night Owl' && hasBF && bigFive.O > 60) ins.push({ icon: '🌙', text: 'Night energy + openness = creative breakthroughs in the quiet hours' });
  }
  return ins;
};

const getAnalysisHints = (completed, bigFive) => {
  const hints = [];
  const qp = getQPSummary(completed);
  const traits = qp?.traits || {};
  if (traits.O > 60) hints.push({ color: 'violet', text: 'Strong curiosity', subtitle: 'You seek out new ideas and experiences' });
  if (traits.A > 60) hints.push({ color: 'emerald', text: 'Natural warmth', subtitle: 'Others feel at ease around you' });
  if (traits.N < 40) hints.push({ color: 'pink', text: 'Steady under pressure', subtitle: 'You stay calm when things get intense' });
  if (traits.E < 40 && traits.O > 50) hints.push({ color: 'cyan', text: 'Rich inner world', subtitle: 'Deep thought over broad socializing' });
  if (traits.E > 60) hints.push({ color: 'amber', text: 'Social energy', subtitle: 'You energize in group settings' });
  if (traits.C > 60) hints.push({ color: 'teal', text: 'Natural organizer', subtitle: 'You thrive with structure and follow-through' });
  if (bigFive.O > 60 && !traits.O) hints.push({ color: 'violet', text: 'Strong curiosity', subtitle: 'Open to new ideas and experiences' });
  if (bigFive.A > 60 && !traits.A) hints.push({ color: 'emerald', text: 'Natural warmth', subtitle: 'Empathetic and considerate' });
  if (bigFive.E > 60 && !traits.E) hints.push({ color: 'amber', text: 'Outgoing nature', subtitle: 'Energized by social interaction' });
  if (bigFive.C > 60 && !traits.C) hints.push({ color: 'teal', text: 'Disciplined approach', subtitle: 'Organized and reliable' });
  if (completed.attachment?.style === 'Secure') hints.push({ color: 'emerald', text: 'Secure attachment', subtitle: 'Comfortable with intimacy and independence' });
  if (completed.chronotype?.type === 'Night Owl') hints.push({ color: 'indigo', text: 'Night owl', subtitle: 'Your best hours are after dark' });
  if (completed.chronotype?.type === 'Morning Lark') hints.push({ color: 'amber', text: 'Early riser', subtitle: 'You conquer mornings' });
  return hints;
};

const getAnalysisResultLabel = (id, result) => {
  if (result.style) return result.style;
  if (result.type) return result.type;
  if (result.indicators !== undefined) return result.indicators >= 4 ? 'High' : result.indicators >= 2 ? 'Moderate' : 'Low';
  if (result.level) return result.level;
  const s = result.score;
  if (s === undefined) return '✓';
  const descs = {
    'bigfive-E': s > 65 ? 'Outgoing' : s < 35 ? 'Reserved' : 'Balanced', 'bigfive-A': s > 65 ? 'Empathetic' : s < 35 ? 'Direct' : 'Balanced',
    'bigfive-C': s > 65 ? 'Organized' : s < 35 ? 'Flexible' : 'Balanced', 'bigfive-N': s > 65 ? 'Sensitive' : s < 35 ? 'Steady' : 'Balanced',
    'bigfive-O': s > 65 ? 'Curious' : s < 35 ? 'Practical' : 'Balanced', 'shadow-M': s > 65 ? 'Strategic' : s < 35 ? 'Straightforward' : 'Situational',
    'shadow-N': s > 65 ? 'Confident' : s < 35 ? 'Humble' : 'Grounded', 'shadow-P': s > 65 ? 'Detached' : s < 35 ? 'Empathic' : 'Balanced',
    'integrity': s > 65 ? 'Strong' : s < 35 ? 'Flexible' : 'Moderate', 'risk': s > 65 ? 'Bold' : s < 35 ? 'Cautious' : 'Balanced',
    'cognitive': s > 65 ? 'High ND' : s < 35 ? 'Low ND' : 'Some traits',
  };
  if (descs[id]) return descs[id];
  if (id.startsWith('reasoning')) return s >= 80 ? 'Strong' : s >= 50 ? 'Solid' : 'Growing';
  return '✓';
};

const CommunityBar = ({ question, community, isDark }) => {
  if (!community?.evaluators?.length) return null;
  const evals = community.evaluators;
  const total = evals.length;
  if (total === 0) return null;
  if (question.type === 'binary') {
    const yesCount = evals.filter(e => e.answer === 0).length;
    const yesPct = Math.round((yesCount / total) * 100);
    return (
      <div className="mt-2 space-y-1" style={{ animation: 'fadeSlideIn 0.2s ease-out both' }}>
        <Stack direction="row" className="justify-between"><Text size="xs" emphasis="secondary">Yes {yesPct}%</Text><Text size="xs" emphasis="secondary">No {100 - yesPct}%</Text></Stack>
        <Stack direction="row" className="h-2 rounded-full overflow-hidden" style={{ background: 'var(--bg-elevated)' }}>
          <div className="h-full rounded-l-full" style={{ width: `${yesPct}%`, background: isDark ? BINARY_COLORS.yes.shades[1] : BINARY_COLORS.yes.shades[3] }} />
          <div className="h-full rounded-r-full flex-1" style={{ background: isDark ? BINARY_COLORS.no.shades[1] : BINARY_COLORS.no.shades[3] }} />
        </Stack>
        <Text size="xs" emphasis="faint" className="text-center">{total} responses</Text>
      </div>
    );
  }
  // Multiple choice — horizontal stacked bar
  const opts = question.options || [];
  const counts = opts.map((_, oi) => evals.filter(e => e.answer === oi).length);
  const mcColors = [COLOR_HEX.violet.light, COLOR_HEX.blue.light, COLOR_HEX.emerald.light, COLOR_HEX.amber.light];
  return (
    <div className="mt-2 space-y-1" style={{ animation: 'fadeSlideIn 0.2s ease-out both' }}>
      {opts.map((opt, oi) => {
        const pct = Math.round((counts[oi] / total) * 100);
        return (
          <div key={oi} className="flex items-center gap-2">
            <Text size="xs" emphasis="secondary" className="w-20 truncate">{opt}</Text>
            <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background: 'var(--bg-elevated)' }}>
              <div className="h-full rounded-full" style={{ width: `${pct}%`, background: mcColors[oi % mcColors.length] }} />
            </div>
            <Text size="xs" emphasis="faint" className="w-8 text-right">{pct}%</Text>
          </div>
        );
      })}
      <Text size="xs" emphasis="faint" className="text-center">{total} responses</Text>
    </div>
  );
};

      <ChipGroup options={filterOptions} selected={[historyFilter]} onChange={(sel) => setHistoryFilter(sel[0] || 'all')} multi={false} color="violet" size="sm" className="p-2" />
      <div ref={scrollRef} className="flex-1 overflow-y-auto p-2 space-y-1">
        {filteredQuestions.length === 0 ? (
          <Placeholder icon="📋" title="No questions match" description={historyFilter === 'all' ? 'Answer some questions to see them here' : 'Try a different filter'} />
        ) : filteredQuestions.map(q => {
          const isExpanded = expandedId === q.id;
          return (
            <Card key={q.id} className="rounded-lg">
              <Stack direction="row" align="start" gap={2}>
                <Text as="span" size="xs">{CATEGORIES.find(c => c.id === q.category)?.icon || '★'}</Text>
                <div className="flex-1 min-w-0">
                  <Text size="xs" className="leading-snug line-clamp-2">{q.text}</Text>
                  <Stack direction="row" align="center" gap={2} className="mt-1.5">
                    <Text as="span" size="xs" weight="medium" color={
                      q.type === 'binary' ? (q.response.answer === 0 ? BINARY_COLORS.yes.shades[1] : BINARY_COLORS.no.shades[1]) : COLOR_HEX.violet.light
                    }>{getAnswerLabel(q)}</Text>
                    <span className="flex gap-0.5">
                      {[1,2,3,4].map(i => <span key={i} className="w-1.5 h-1.5 rounded-full"
                        style={{ background: i <= q.response.confidence ? COLOR_HEX.violet.light : 'var(--bg-elevated)' }} />)}
                    </span>
                    <Text as="span" size="xs" emphasis="subtle">{CONFIDENCE_LABELS[q.response.confidence - 1]}</Text>
                    {q.meta?.flag && <Text as="span" size="xs" color={COLOR_HEX.rose.light}>⚑</Text>}
                    {q.meta?.explain && <Text as="span" size="xs" color={COLOR_HEX.amber.light}>✎</Text>}
                  </Stack>
                  {q.community && (
                    <button onClick={() => setExpandedId(isExpanded ? null : q.id)} className="w-full mt-1.5 flex items-center justify-between cursor-pointer" style={{ background: 'none', border: 'none', padding: 0 }}>
                      <Text size="xs" emphasis="faint">{q.community.evaluators?.length || 0} responses</Text>
                      <Text size="xs" emphasis="faint">{isExpanded ? '▲' : '▼'}</Text>
                    </button>
                  )}
                  {isExpanded && q.community && <CommunityBar question={q} community={q.community} isDark={isDark} />}
                </div>
              </Stack>
            </Card>
          );
        })}
      </div>
    </Screen>
  );
};

// — IDENTITY SCREEN — Lightweight onboarding + stamp management
const IDENTITY_ONBOARD_KEY = 'aura-identity-onboard-v1';
// Fallback: production used these keys — migrate on first read
const IDENTITY_LEGACY_KEYS = ['aura-identity-onboarding-v1', 'aura-identity-v1'];
const getIdentityData = () => {
  const current = localStorage.getItem(IDENTITY_ONBOARD_KEY);
  if (current) return current;
  for (const key of IDENTITY_LEGACY_KEYS) {
    const legacy = localStorage.getItem(key);
    if (legacy) { localStorage.setItem(IDENTITY_ONBOARD_KEY, legacy); return legacy; }
  }
  return null;
};
const IDENTITY_QUESTIONS = [
  { id: 'source', text: 'How did you find Aura?', options: ['A friend told me', 'Exploring on my own', 'Someone sent me a link', 'Proving my identity'] },
  { id: 'know-anyone', text: 'Know anyone already using Aura?', options: ['Yeah, I think so', 'Maybe — not sure', "Nope, I'm new here"] },
  { id: 'location', text: 'Where are you based?', placeholder: 'City, Country', isText: true },
];

const IdentityOnboardingFlow = ({ isDark, onComplete }) => {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const timerRef = useRef(null);
  useEffect(() => () => clearTimeout(timerRef.current), []);
  const q = IDENTITY_QUESTIONS[step];
  const handleSelect = (val) => {
    const next = { ...answers, [q.id]: val };
    setAnswers(next);
    timerRef.current = setTimeout(() => {
      if (step + 1 < IDENTITY_QUESTIONS.length) setStep(step + 1);
      else { localStorage.setItem(IDENTITY_ONBOARD_KEY, JSON.stringify(next)); onComplete(next); }
    }, 300);
  };
  const handleTextSubmit = () => {
    if (step + 1 < IDENTITY_QUESTIONS.length) setStep(step + 1);
    else { localStorage.setItem(IDENTITY_ONBOARD_KEY, JSON.stringify(answers)); onComplete(answers); }
  };
  return (
    <Stack align="center" className="flex-1 justify-center px-6" gap={6} style={{ animation: 'fadeSlideIn 0.4s ease-out both' }}>
      <Text size="xs" emphasis="faint">{step + 1} of {IDENTITY_QUESTIONS.length}</Text>
      <Text as="h2" weight="semibold" className="text-center">{q.text}</Text>
      {q.isText ? (
        <Stack gap={3} className="w-full max-w-xs">
          <input value={answers[q.id] || ''} onChange={e => setAnswers(a => ({ ...a, [q.id]: e.target.value }))} placeholder={q.placeholder}
            onKeyDown={e => { if (e.key === 'Enter') handleTextSubmit(); }} onFocus={e => e.target.select()} maxLength={100}
            className="w-full px-4 py-3 rounded-xl text-center" style={{ background: 'var(--bg-input)', color: 'var(--input-text)', border: '1px solid var(--border-base)' }} autoFocus />
          <Stack direction="row" gap={2} className="justify-center">
            <Button variant="ghost" size="sm" onClick={handleTextSubmit}>Skip</Button>
            <Button variant="primary" size="sm" color="emerald" onClick={handleTextSubmit} disabled={!(answers[q.id] || '').trim()}>Continue</Button>
          </Stack>
        </Stack>
      ) : (
        <Stack gap={2} className="w-full max-w-xs">
          {q.options.map(opt => (
            <button key={opt} onClick={() => handleSelect(opt)}
              className="w-full px-4 py-3 rounded-xl text-left transition-all btn-feedback cursor-pointer"
              style={{ background: answers[q.id] === opt ? `rgba(${COLOR_HEX.emerald.rgb},0.15)` : 'var(--bg-card)', border: `1px solid ${answers[q.id] === opt ? `rgba(${COLOR_HEX.emerald.rgb},0.4)` : 'var(--border-card)'}`, color: 'var(--text-primary)' }}>
              <Text size="sm">{opt}</Text>
            </button>
          ))}
        </Stack>
      )}
    </Stack>
  );
};

// — SHARE PICKER — Bottom sheet for stamp visibility + primary selection + profile link
const SharePicker = ({ isDark, userId, claims, displayName, assessmentCount, onSetPrimary, onMakePublic }) => {
  const [open, setOpen] = useState(false);
  const [choosingPrimary, setChoosingPrimary] = useState(false);
  const [copied, setCopied] = useState(false);
  const [selections, setSelections] = useState({});

  const primaryClaim = (claims || []).find(c => c.weight === 1);
  const shareableStamps = (claims || []).filter(c => c.provider !== 'email' && c.value && (c.visibility || 'public') === 'public');
  const linkedClaims = (claims || []).filter(c => c.value);

  const copyUrl = async (url) => {
    try { if (navigator.share) { await navigator.share({ title: 'My Aura Profile', url }); setOpen(false); return; } } catch (err) { if (err.name === 'AbortError') return; }
    try { await navigator.clipboard.writeText(url); } catch { const ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
    setCopied(true); setTimeout(() => { setCopied(false); setOpen(false); }, 1200);
  };

  const handleOpen = () => {
    if (!primaryClaim && linkedClaims.length > 0) { setChoosingPrimary(true); setOpen(true); return; }
    if (shareableStamps.length === 0) { copyUrl(`${window.location.origin}${window.location.pathname}?p=${userId}`); return; }
    const init = {}; shareableStamps.forEach(c => { init[c.provider] = true; }); setSelections(init); setChoosingPrimary(false); setOpen(true);
  };

  const handleChoosePrimary = async (claimId) => {
    if (onSetPrimary) await onSetPrimary(claimId);
    setChoosingPrimary(false);
    setTimeout(() => { const init = {}; shareableStamps.forEach(c => { init[c.provider] = true; }); setSelections(init); }, 100);
  };

  const handleCopyLink = () => {
    const selected = Object.entries(selections).filter(([_, on]) => on).map(([id]) => id);
    shareableStamps.forEach(c => { if (selections[c.provider] && onMakePublic) onMakePublic(c.id); });
    let url = `${window.location.origin}${window.location.pathname}?p=${userId}`;
    if (selected.length > 0) url += `&s=${selected.join(',')}`;
    copyUrl(url);
  };

  const sheetBg = isDark ? 'bg-gray-900 border-t border-gray-800' : 'bg-white border-t border-gray-200';
  const closeBtnClass = `text-lg px-1.5 py-0.5 rounded cursor-pointer ${isDark ? 'text-gray-500 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600'}`;

  return (
    <>
      <button onClick={handleOpen} className={`text-xs px-2.5 py-1 rounded-lg font-medium transition-colors cursor-pointer ${
        copied ? (isDark ? 'bg-emerald-500/20 text-emerald-400' : 'bg-emerald-100 text-emerald-700')
        : (isDark ? 'bg-white/[0.06] text-gray-400 hover:text-white' : 'bg-gray-100 text-gray-500 hover:text-gray-700')
      }`}>{copied ? '✓ Copied' : 'Share'}</button>

      {open && (
        <div className="fixed inset-0 z-50 flex items-end justify-center" onClick={() => setOpen(false)}>
          <div className="absolute inset-0 bg-black/60" />
          <div onClick={(e) => e.stopPropagation()} className={`relative w-full max-w-md rounded-t-2xl px-5 pt-5 pb-6 ${sheetBg}`} style={{ animation: 'slideUp 0.2s ease-out' }}>
            {choosingPrimary ? (
              <>
                <Stack direction="row" className="justify-between mb-3"><Text size="base" weight="semibold">Choose your public name</Text><button onClick={() => setOpen(false)} className={closeBtnClass}>✕</button></Stack>
                <Text size="xs" emphasis="muted" className="mb-4">Pick how you'll appear when you share your profile.</Text>
                <Stack gap={1} className="mb-4">
                  {linkedClaims.map(claim => {
                    const provider = STAMP_PROVIDERS.find(p => p.id === claim.provider);
                    if (!provider) return null;
                    return (
                      <Stack key={claim.id} direction="row" align="center" gap={2} className={`rounded-lg px-3 py-2.5 ${isDark ? 'bg-white/[0.04] border border-white/[0.08]' : 'bg-white border border-gray-200'}`}>
                        <StampIcon provider={provider} size={14} />
                        <Text size="xs" weight="medium" className="flex-1 min-w-0 truncate">{formatStampDisplay(claim.provider, claim.value) || claim.label || provider.name}</Text>
                        <button onClick={() => handleChoosePrimary(claim.id)} className={`text-[10px] px-3 py-1 rounded-lg font-medium cursor-pointer ${isDark ? 'bg-violet-600/30 text-violet-300 hover:bg-violet-600/50' : 'bg-violet-100 text-violet-700 hover:bg-violet-200'}`}>Use</button>
                      </Stack>
                    );
                  })}
                </Stack>
              </>
            ) : (
              <>
                <Stack direction="row" className="justify-between mb-4"><Text size="base" weight="semibold">Share Profile</Text><button onClick={() => setOpen(false)} className={closeBtnClass}>✕</button></Stack>
                <Stack direction="row" gap={3} className="mb-4">
                  <div className="w-10 h-10 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-full flex items-center justify-center font-bold text-sm text-white">{(displayName || 'A')[0].toUpperCase()}</div>
                  <div><Text size="sm" weight="medium">{displayName || 'Aura User'}</Text><Text size="xs" emphasis="muted">{assessmentCount || 0} assessments</Text></div>
                </Stack>
                <div className={`border-t mb-3 ${isDark ? 'border-gray-800' : 'border-gray-200'}`} />
                {primaryClaim && (() => {
                  const pProv = STAMP_PROVIDERS.find(p => p.id === primaryClaim.provider);
                  if (!pProv) return null;
                  return (
                    <div className="mb-3">
                      <Text size="xs" weight="medium" emphasis="muted" className="mb-1.5">Your identity:</Text>
                      <Stack direction="row" align="center" gap={2} className={`rounded-lg px-2.5 py-2 ${isDark ? 'bg-amber-500/[0.06] border border-amber-500/20' : 'bg-amber-50 border border-amber-200'}`}>
                        <StampIcon provider={pProv} size={14} />
                        <Text size="xs" weight="medium" className="flex-1 min-w-0 truncate">{formatStampDisplay(primaryClaim.provider, primaryClaim.value) || primaryClaim.label}</Text>
                        <Text size="xxs" color={isDark ? '#fbbf24' : '#d97706'}>★ Primary</Text>
                      </Stack>
                    </div>
                  );
                })()}
                {shareableStamps.filter(c => !primaryClaim || c.id !== primaryClaim.id).length > 0 && (
                  <>
                    <Text size="xs" weight="medium" emphasis="muted" className="mb-2.5">Include in this link:</Text>
                    <Stack gap={1} className="mb-5">
                      {shareableStamps.filter(c => !primaryClaim || c.id !== primaryClaim.id).map(claim => {
                        const provider = STAMP_PROVIDERS.find(p => p.id === claim.provider);
                        if (!provider) return null;
                        const isOn = selections[claim.provider];
                        return (
                          <Stack key={claim.provider} direction="row" align="center" gap={2} className={`rounded-lg px-2.5 py-2 ${isDark ? 'bg-white/[0.04] border border-white/[0.08]' : 'bg-white border border-gray-200'}`}>
                            <StampIcon provider={provider} size={14} />
                            <Text size="xs" className="flex-1 min-w-0 truncate">{formatStampDisplay(claim.provider, claim.value) || claim.label}</Text>
                            <button onClick={() => setSelections(prev => ({ ...prev, [claim.provider]: !prev[claim.provider] }))}
                              className={`w-9 h-5 rounded-full flex items-center transition-colors cursor-pointer flex-shrink-0 ${isOn ? (isDark ? 'bg-emerald-600' : 'bg-emerald-500') : (isDark ? 'bg-gray-700' : 'bg-gray-300')}`}>
                              <div className={`w-3.5 h-3.5 rounded-full mx-0.5 transition-transform ${isOn ? 'translate-x-4 bg-white' : 'translate-x-0 bg-white/80'}`} />
                            </button>
                          </Stack>
                        );
                      })}
                    </Stack>
                  </>
                )}
                <button onClick={handleCopyLink} className={`w-full py-3 rounded-xl font-semibold text-sm transition-colors cursor-pointer ${
                  copied ? (isDark ? 'bg-emerald-600/30 text-emerald-400' : 'bg-emerald-100 text-emerald-700')
                  : 'bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white hover:from-violet-500 hover:to-fuchsia-500'
                }`}>{copied ? '✓ Copied!' : 'Copy Link'}</button>
              </>
            )}
          </div>
        </div>
      )}
    </>
  );
};

const IdentityScreen = ({ isDark, onNavigate, displayName, assessmentCount }) => {
  const [onboardingDone, setOnboardingDone] = useState(() => !!getIdentityData());
  const identityData = useMemo(() => { try { return JSON.parse(getIdentityData() || '{}'); } catch { return {}; } }, [onboardingDone]);
  const auth = useAuth();
  const shareRight = auth.user ? <SharePicker isDark={isDark} userId={auth.user.id} claims={auth.claims} displayName={displayName} assessmentCount={assessmentCount} onSetPrimary={auth.setPrimaryClaim} onMakePublic={(claimId) => auth.updateClaimVisibility(claimId, 'public')} /> : null;
  if (!onboardingDone) {
    return (
      <Screen header={<NavBar back title="Identity" right={shareRight} onBack={() => onNavigate('profile')} />}>
        <IdentityOnboardingFlow isDark={isDark} onComplete={() => setOnboardingDone(true)} />
      </Screen>
    );
  }
  return (
    <Screen header={<NavBar back title="Identity" right={shareRight} onBack={() => onNavigate('profile')} />}>
      <Screen.Body>
        <Stack gap={4}>
          <Card>
            <Text size="xs" weight="semibold" emphasis="subtle" className="uppercase tracking-wide mb-2">Linked Accounts</Text>
            <Stack gap={1}>
              {STAMP_PROVIDERS.filter(p => p.id !== 'email').map(pc => {
                const claim = (auth.claims || []).find(c => c.provider === pc.id);
                return <StampRow key={pc.id} providerConfig={pc} claim={claim}
                  isOAuthLinked={pc.oauth && auth.isOAuthLinked(pc.supabaseProvider)}
                  onOAuthLink={auth.linkProvider} onOAuthUnlink={auth.unlinkProvider}
                  onSelfReportLink={auth.createClaim} onRemoveClaim={auth.removeClaim} />;
              })}
            </Stack>
          </Card>
          <Card>
            <Text size="xs" weight="semibold" emphasis="subtle" className="uppercase tracking-wide mb-2">About You</Text>
            {identityData.source || identityData['know-anyone'] || identityData.location ? (
                  <Stack gap={2}>
                    {identityData.source && <Stack direction="row" className="justify-between"><Text size="sm" emphasis="secondary">Found Aura</Text><Text size="sm" emphasis="muted">{identityData.source}</Text></Stack>}
                    {identityData['know-anyone'] && <Stack direction="row" className="justify-between"><Text size="sm" emphasis="secondary">Connections</Text><Text size="sm" emphasis="muted">{identityData['know-anyone']}</Text></Stack>}
                    {identityData.location && <Stack direction="row" className="justify-between"><Text size="sm" emphasis="secondary">Location</Text><Text size="sm" emphasis="muted">{identityData.location}</Text></Stack>}
                  </Stack>
            ) : <Text size="sm" emphasis="muted">No info yet</Text>}
          </Card>
        </Stack>
      </Screen.Body>
    </Screen>
  );
};

// — SETTINGS SCREEN — Phase 5 + Phase 6 auth
const SettingsScreen = ({ isDark, toggleTheme, settings, entityType, setEntityType, onBack, onReset, hasAssessmentData, onResetAssessments, displayName, setDisplayName, hasVerificationData, onResetVerification, responses }) => {
  const { undoDelay, setUndoDelay, requireConfirmation, setRequireConfirmation, showTips, setShowTips, showStreak, setShowStreak } = settings;
  const auth = useAuth();
  const [devTapCount, setDevTapCount] = useState(0);
  const devTapTimer = useRef(null);
  const [kbOpen, setKbOpen] = useState(false);
  const [editingName, setEditingName] = useState(false);
  const [nameInput, setNameInput] = useState(displayName || '');
  const handleVersionTap = () => {
    setDevTapCount(c => {
      const next = c + 1;
      clearTimeout(devTapTimer.current);
      devTapTimer.current = setTimeout(() => setDevTapCount(0), 2000);
      return next;
    });
  };

  const handleNameSave = () => {
    const trimmed = nameInput.trim();
    setDisplayName(trimmed);
    localStorage.setItem('aura-display-name', trimmed);
    auth.updateDisplayName(trimmed);
    setEditingName(false);
  };

  return (
    <Screen header={<NavBar back title="Settings" onBack={onBack} />}>
      <div className="flex-1 overflow-y-auto p-4">
        <Stack gap={3}>
          {/* Account section */}
          {auth.user ? (
            <Card>
              <Text size="xs" weight="semibold" emphasis="subtle" className="uppercase tracking-wide mb-2">Account</Text>
              <Stack direction="row" align="center" className="justify-between mb-2">
                <Text size="sm" emphasis="secondary">{auth.user.email}</Text>
                <Button variant="ghost" size="sm" onClick={auth.signOut}>Sign Out</Button>
              </Stack>
              <Stack direction="row" align="center" className="justify-between">
                <Text size="sm" weight="medium">Display Name</Text>

                      onFocus={e => e.target.select()}
                      className="px-2 py-1 rounded text-sm" style={{ background: 'var(--bg-input)', color: 'var(--input-text)', border: '1px solid var(--border-base)', width: '120px' }} autoFocus />
                    <Button variant="ghost" size="sm" onClick={handleNameSave}>Save</Button>
                  </Stack>
                ) : (
                  <button onClick={() => { setNameInput(displayName || ''); setEditingName(true); }} className="cursor-pointer">
                    <Text size="sm" emphasis="subtle">{displayName || 'Set name'} ✎</Text>

                      providerConfig={providerConfig}
                      claim={claim}
                      isOAuthLinked={providerConfig.oauth && auth.isOAuthLinked(providerConfig.supabaseProvider)}
                      onOAuthLink={auth.linkProvider}
                      onOAuthUnlink={auth.unlinkProvider}
                      onSelfReportLink={auth.createClaim}
                      onRemoveClaim={auth.removeClaim} />;
                  })}
                </Stack>
              </div>
            </Card>
          ) : (
            <Card>
              <Stack direction="row" align="center" className="justify-between">
                <div>
                  <Text size="sm" weight="medium">Sign In</Text>

          <Card>

                  <Stack key={label} direction="row" className="justify-between">

                    <Text size="sm" emphasis="subtle" className="font-mono">{key}</Text>
                  </Stack>

          </Card>
          {/* Data Management */}
          <Card>
            <Text size="sm" weight="medium" className="mb-2">Your Data</Text>
            <Stack direction="row" gap={2}>
              <Button variant="secondary" color="emerald" size="sm" onClick={() => {
                try {
                  if (!responses || !Object.keys(responses).length) return;
                  const data = { responses, timestamp: new Date().toISOString() };
                  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a'); a.href = url; a.download = `aura-export-${Date.now()}.json`; a.click();
                  setTimeout(() => URL.revokeObjectURL(url), 1000);
                } catch (err) { console.error('Export failed:', err); }
              }}>JSON</Button>
              <Button variant="secondary" color="blue" size="sm" onClick={() => {
                try {
                  if (!responses || !Object.keys(responses).length) return;
                  const lines = ['# Aura Export', `*${new Date().toLocaleDateString()}*`, ''];
                  const grouped = {};
                  QUESTIONS.forEach(q => {
                    const r = responses[q.id]; if (!r) return;
                    const cat = q.category || 'other';
                    if (!grouped[cat]) grouped[cat] = [];
                    const answer = q.type === 'binary' ? (r.answer === 0 ? 'Yes' : 'No') : (q.options?.[r.answer] || '?');
                    grouped[cat].push(`- **${q.text}**  \n  ${answer} (confidence: ${'●'.repeat(r.confidence)}${'○'.repeat(4 - r.confidence)})`);
                  });
                  Object.entries(grouped).forEach(([cat, items]) => {
                    const catInfo = CATEGORIES.find(c => c.id === cat);
                    lines.push(`## ${catInfo?.icon || '★'} ${catInfo?.name || cat}`, '', ...items, '');
                  });
                  const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a'); a.href = url; a.download = `aura-export-${Date.now()}.md`; a.click();
                  setTimeout(() => URL.revokeObjectURL(url), 1000);
                } catch (err) { console.error('Export failed:', err); }
              }}>Markdown</Button>
            </Stack>
          </Card>
          {/* Reset buttons */}
          <Stack direction="row" gap={2} className="flex-wrap">
            {hasAssessmentData && (
              <Button variant="outline" color="amber" size="full" className="flex-1" onClick={onResetAssessments}>Clear Assessments</Button>
            )}
            {hasVerificationData && (
              <Button variant="outline" color="teal" size="full" className="flex-1" onClick={onResetVerification}>Clear Verification</Button>
            )}
            <Button variant="outline" color="rose" size="full" className={(hasAssessmentData || hasVerificationData) ? 'flex-1' : ''} onClick={onReset}>Reset All Data</Button>
          </Stack>
          <div className="text-center" onClick={handleVersionTap}>
            <Text size="xxs" emphasis="faint">Aura Player vR5</Text>
          </div>
        </Stack>
      </div>
    </Screen>
  );
};

// — SHARE BUTTONS — Phase 5: Reusable social share row
const ShareButtons = ({ getText, getUrl, isDark }) => {
  const [sharing, setSharing] = useState(null);
  const [copied, setCopied] = useState(false);
  const share = async (id, handler) => {
    if (sharing) return;
    setSharing(id);
    try {
      const url = await getUrl();
      const text = getText();
      if (url) await handler(url, text);
    } finally { setSharing(null); }
  };

  const btnStyle = { background: 'var(--bg-elevated)', color: 'var(--text-secondary)' };
  const btnClass = 'px-3.5 py-2 rounded-xl flex items-center justify-center transition-all';
  const labelStyle = { color: 'var(--text-subtle)', fontSize: '10px' };
  return (
    <Stack direction="row" className="justify-center" gap={5}>
      <button onClick={() => share('x', (url, text) => window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank'))}
        disabled={!!sharing} className="flex flex-col items-center gap-1.5">
        <div className={btnClass} style={btnStyle}><Text as="span" size="xs" weight="bold" emphasis="secondary">𝕏</Text></div>
        <span style={labelStyle}>{sharing === 'x' ? '...' : 'Post'}</span>
      </button>
      <button onClick={() => share('fb', (url, text) => window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`, '_blank'))}
        disabled={!!sharing} className="flex flex-col items-center gap-1.5">
        <div className={btnClass} style={btnStyle}>
          <svg style={{ color: 'var(--text-secondary)' }} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        </div>
        <span style={labelStyle}>{sharing === 'fb' ? '...' : 'Share'}</span>
      </button>
      {typeof navigator.share === 'function' && (
        <button onClick={() => share('text', async (url, text) => {
          try { await navigator.share({ title: 'Compare Auras', text, url }); } catch (_) {}
        })} disabled={!!sharing} className="flex flex-col items-center gap-1.5">
          <div className={btnClass} style={btnStyle}>
            <svg style={{ color: 'var(--text-secondary)' }} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <span style={labelStyle}>{sharing === 'text' ? '...' : 'Text'}</span>
        </button>
      )}
      <button onClick={() => share('copy', async (url, text) => {
        try { await navigator.clipboard.writeText(`${text}\n${url}`); } catch (_) {}
        setCopied(true); setTimeout(() => setCopied(false), 2000);
      })} disabled={!!sharing} className="flex flex-col items-center gap-1.5">
        <div className={btnClass} style={copied ? { background: `rgba(${COLOR_HEX.emerald.rgb}, 0.2)`, color: COLOR_HEX.emerald.light } : btnStyle}>
          {copied
            ? <svg style={{ color: COLOR_HEX.emerald.light }} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            : <svg style={{ color: 'var(--text-secondary)' }} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>}
        </div>
        <span style={{ ...labelStyle, color: copied ? COLOR_HEX.emerald.light : 'var(--text-subtle)' }}>{copied ? 'Copied!' : sharing === 'copy' ? '...' : 'Link'}</span>

// — STAMP ROW — Phase 5: Account linking (placeholder until Supabase)
// StampRow — linked account with OAuth verification support
const StampRow = ({ providerConfig, claim, isOAuthLinked, onOAuthLink, onOAuthUnlink, onSelfReportLink, onRemoveClaim }) => {
  const { isDark } = useTheme();
  const [editing, setEditing] = useState(false);
  const [inputValue, setInputValue] = useState('');
  const [linking, setLinking] = useState(false);
  const isLinked = !!claim;
  const isVerified = claim?.proof_type === 'oauth' || claim?.proof_type === 'password';
  const displayValue = claim ? (formatStampDisplay(providerConfig.id, claim.value) || claim.label) : null;

  const handleOAuthLink = async () => {
    setLinking(true);
    try { await onOAuthLink(providerConfig.supabaseProvider); }
    catch (err) { console.warn('[Aura] OAuth link error:', err.message); setLinking(false); }
  };

  const handleSelfReportSave = async () => {
    const normalized = normalizeStampValue(providerConfig.id, inputValue);
    if (!normalized) return;
    await onSelfReportLink(providerConfig.id, normalized, normalized);
    setEditing(false);
    setInputValue('');
  };

  const handleRemove = async () => {
    if (providerConfig.oauth && isOAuthLinked) {
      await onOAuthUnlink(providerConfig.supabaseProvider);
    } else if (claim) {
      await onRemoveClaim(claim.id);
    }
  };

  // Editing state for self-reported linking
  if (editing) {
    return (
      <div className="rounded-xl px-3 py-3 space-y-2" style={{ background: isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)', border: `1px solid ${isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)'}` }}>
        <Stack direction="row" align="center" gap={2}>
          <StampIcon provider={providerConfig} size={16} />
          <Text size="sm" weight="medium">{providerConfig.name}</Text>
        </Stack>
        <Stack direction="row" align="center" className="rounded-lg" style={{ background: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)', border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.10)'}` }}>
          {providerConfig.prefix && <span className="text-sm pl-2.5 select-none" style={{ color: 'var(--text-faint)' }}>{providerConfig.prefix}</span>}
          <input value={inputValue} onChange={e => setInputValue(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') handleSelfReportSave(); if (e.key === 'Escape') setEditing(false); }}
            placeholder={providerConfig.placeholder || 'username'} autoFocus
            className="text-sm flex-1 min-w-0 px-2 py-2 bg-transparent outline-none" style={{ color: 'var(--text-primary)' }} />
        </Stack>
        <Stack direction="row" gap={2}>
          <Button variant="secondary" color="emerald" size="sm" onClick={handleSelfReportSave}>Save</Button>
          <Button variant="ghost" size="sm" onClick={() => setEditing(false)}>Cancel</Button>
        </Stack>
      </div>
    );
  }

  return (
    <Stack direction="row" align="center" className="justify-between py-2.5">
      <Stack direction="row" align="center" gap={3}>
        <div className="w-8 h-8 rounded-full flex items-center justify-center"
          style={{ background: isLinked ? `rgba(${COLOR_HEX.violet.rgb},0.15)` : 'var(--bg-elevated)' }}>
          <StampIcon provider={providerConfig} size={16} />
        </div>
        <div>
          <Stack direction="row" align="center" gap={1}>
            <Text size="sm" weight="medium">{providerConfig.name}</Text>
            {isLinked && isVerified && <Text as="span" size="xs" style={{ color: COLOR_HEX.emerald.base }}>✓</Text>}
            {isLinked && !isVerified && <Text as="span" size="xxs" emphasis="faint">unverified</Text>}
          </Stack>
          {displayValue && <Text size="xs" emphasis="subtle">{displayValue}</Text>}
        </div>
      </Stack>
      {isLinked ? (
        <Button variant="ghost" size="sm" onClick={handleRemove}><Text as="span" size="xxs" emphasis="subtle">Remove</Text></Button>
      ) : providerConfig.oauth ? (
        <Button variant="outline" color="violet" size="sm" onClick={handleOAuthLink} disabled={linking}>
          {linking ? '...' : 'Verify'}
        </Button>
      ) : (
        <Button variant="outline" color="slate" size="sm" onClick={() => { setEditing(true); setInputValue(''); }}>Link</Button>
      )}
    </Stack>
  );
};

// — QOTD SCREEN — Question of the Day (reuses existing Q&A primitives)
const QotdScreen = ({ isDark, qotdData, qotdResponse, setQotdResponse, onNavigate }) => {
  const [tapped, setTapped] = useState(null);
  if (!qotdData) return <Placeholder icon="🌀" title="No question today" />;
  const isBinary = qotdData.type === 'binary';
  const hasAnswered = qotdResponse !== null;

  const handleAnswer = (answer) => {
    setTapped(answer);
    setTimeout(() => {
      setQotdResponse({ answer, confidence: 3, timestamp: Date.now() });
      setTapped(null);
    }, 300);
  };

  // Build community results from distribution data
  const getCommunityRows = () => {
    if (!hasAnswered) return null;
    if (isBinary) {
      const yesTotal = qotdData.distribution.yes.reduce((a, b) => a + b, 0);
      const noTotal = qotdData.distribution.no.reduce((a, b) => a + b, 0);
      const total = yesTotal + noTotal;
      return [
        { label: 'Yes', count: yesTotal, pct: Math.round((yesTotal / total) * 100), byConf: qotdData.distribution.yes, colors: BINARY_COLORS.yes, isUser: qotdResponse?.answer === 0 },
        { label: 'No', count: noTotal, pct: Math.round((noTotal / total) * 100), byConf: qotdData.distribution.no, colors: BINARY_COLORS.no, isUser: qotdResponse?.answer === 1 },
      ];
    }
    const opts = qotdData.options || [];
    const total = qotdData.distribution.reduce((sum, opt) => sum + opt.reduce((a, b) => a + b, 0), 0);
    return opts.map((label, idx) => {
      const optTotal = qotdData.distribution[idx].reduce((a, b) => a + b, 0);
      return { label, count: optTotal, pct: Math.round((optTotal / total) * 100), byConf: qotdData.distribution[idx], colors: MC_COLORS[idx % MC_COLORS.length].shades, isUser: qotdResponse?.answer === idx };
    });
  };

  const rows = getCommunityRows();
  const maxCount = rows ? Math.max(...rows.map(r => r.count), 1) : 1;

  return (
    <Screen header={<NavBar back title="Question of the Day" onBack={() => onNavigate('categories')} />}>
      <Screen.Body className="space-y-4">
        {qotdData.sponsor && (
          <Stack direction="row" align="center" gap={2} className="justify-center">
            <span className="text-sm">{qotdData.sponsor.avatar}</span>
            <Text size="xxs" emphasis="subtle">{qotdData.sponsor.name}</Text>
          </Stack>
        )}
        <div className="text-center px-4">
          <Text size="lg" weight="semibold" className="leading-relaxed" style={{ textWrap: 'balance' }}>{qotdData.text}</Text>
        </div>

        {!hasAnswered && (
          <div className="space-y-2 px-4">
            {isBinary ? (
              <Stack direction="row" gap={3}>
                <Button color="emerald" size="full" className="flex-1" onClick={() => handleAnswer(0)}>Yes</Button>
                <Button color="rose" size="full" className="flex-1" onClick={() => handleAnswer(1)}>No</Button>
              </Stack>
            ) : (
              (qotdData.options || []).map((opt, idx) => {
                const mc = MC_COLORS[idx % MC_COLORS.length];
                return (
                  <button key={idx} onClick={() => handleAnswer(idx)}
                    className={`w-full py-3 px-4 rounded-xl text-left transition-all border ${isDark ? 'border-white/[0.06] bg-white/[0.03]' : 'border-black/[0.06] bg-white'}`}
                    style={tapped === idx ? { background: `rgba(${mc.rgb},0.2)`, borderColor: mc.hex } : {}}>
                    <Text size="sm">{opt}</Text>
                  </button>
                );
              })
            )}
          </div>
        )}

        {hasAnswered && rows && (
          <Card>
            <Text size="xs" weight="semibold" emphasis="subtle" className="uppercase tracking-wide mb-3">Community Results</Text>
            <Stack gap={2}>
              {rows.map((row, i) => (
                <Stack key={i} direction="row" align="center" gap={2}>
                  <Text as="span" size="xs" weight="medium" className="w-8 text-right" style={{ color: row.isUser ? row.colors[2] : 'var(--text-subtle)' }}>
                    {row.pct}%
                  </Text>
                  {renderConfidenceBar(row.byConf, row.colors, maxCount, row.isUser, 2, 'h-5', isDark)}
                  <Text as="span" size="xxs" emphasis="subtle" className="w-8">{row.label}</Text>
                </Stack>
              ))}
            </Stack>
            <Text size="xxs" emphasis="faint" className="text-center mt-3">{qotdData.totalResponses?.toLocaleString()} responses</Text>
          </Card>
        )}
      </Screen.Body>
    </Screen>
  );
};

// VerifyVerdict — yes/no + confidence + expandable flags
const VerifyVerdict = ({ question, color = 'emerald', answer, onAnswer }) => {
  const { isDark } = useTheme();
  const val = answer || {};
  const verdict = val.verdict;
  const flags = val.flags || [];
  const [showFlags, setShowFlags] = useState(false);
  const setField = (field, v) => onAnswer({ ...val, [field]: v });
  const toggleFlag = (flag) => {
    const next = flags.includes(flag) ? flags.filter(f => f !== flag) : [...flags, flag];
    onAnswer({ ...val, flags: next });
  };
  return (
    <Stack align="center" className="w-full" gap={5} style={{ animation: 'fadeSlideIn 0.4s ease-out both' }}>
      <Stack direction="row" className="w-full" gap={3}>
        {(question.verdictOptions || ['Yes', 'No']).map((opt, i) => {
          const isYes = i === 0;
          const sel = verdict === opt;
          const vc = isYes ? COLOR_HEX.emerald : COLOR_HEX.rose;
          return (
            <button key={opt} onClick={() => setField('verdict', opt)}
              className="flex-1 py-4 rounded-2xl font-semibold text-base transition-all duration-200"
              style={{
                background: sel
                  ? `linear-gradient(135deg, rgba(${vc.rgb}, 0.25), rgba(${vc.rgb}, 0.1))`
                  : (isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)'),
                border: sel
                  ? `1.5px solid rgba(${vc.rgb}, 0.5)`
                  : (isDark ? '1px solid rgba(255,255,255,0.06)' : '1px solid rgba(0,0,0,0.06)'),
                color: sel ? (isDark ? '#fff' : vc.base) : (isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)'),
                transform: sel ? 'scale(1.03)' : 'scale(1)',
                animation: sel ? 'verdict-pulse 0.3s ease-out' : 'none',
              }}>
              {opt}
            </button>
          );
        })}
      </Stack>
      {verdict && (
        <div className="w-full" style={{ animation: 'fadeSlideIn 0.3s ease-out both' }}>
          <Text size="xs" emphasis="faint" className="text-center mb-4">How sure are you?</Text>
          <VerifyStarConfidence color={color} value={val.confidence} onChange={v => setField('confidence', v)} />
        </div>
      )}
      {verdict && question.flags && (
        <div className="w-full" style={{ animation: 'fadeSlideIn 0.3s ease-out both 0.1s' }}>
          <button onClick={() => setShowFlags(!showFlags)}
            className="w-full flex items-center justify-between px-4 py-3 rounded-2xl transition-all duration-200"
            style={{
              background: (showFlags || flags.length > 0)
                ? (isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)')
                : (isDark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.015)'),
              border: flags.length > 0
                ? `1px solid rgba(${COLOR_HEX.amber.rgb}, 0.3)`
                : (isDark ? '1px solid rgba(255,255,255,0.06)' : '1px solid rgba(0,0,0,0.06)'),
            }}>
            <Text size="sm" weight="medium" style={{ color: flags.length > 0 ? (isDark ? COLOR_HEX.amber.light : COLOR_HEX.amber.base) : undefined }} emphasis={flags.length > 0 ? undefined : 'faint'}>
              {flags.length > 0 ? `${flags.length} concern${flags.length > 1 ? 's' : ''} flagged` : 'Anything feel off?'}
            </Text>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"
              className={`transition-transform duration-200 ${showFlags ? 'rotate-180' : ''}`}
              style={{ color: isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)' }}>
              <path d="M3 4.5L6 7.5L9 4.5" />
            </svg>
          </button>
          {showFlags && (
            <div className="mt-2" style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px', animation: 'fadeSlideIn 0.2s ease-out both' }}>

const VerifyMultiToggle = ({ question, color, answer, onAnswer }) => {
  const selected = Array.isArray(answer) ? answer : [];
  const toggle = (opt) => {
    const next = selected.includes(opt) ? selected.filter(x => x !== opt) : [...selected, opt];
    if (question.maxSelect && next.length > question.maxSelect) return;
    onAnswer(next);
  };
  const hint = question.maxSelect ? `Pick up to ${question.maxSelect}` : 'Toggle all that apply';
  return (
    <Stack gap={2} className="w-full" style={{ animation: 'fadeSlideIn 0.4s ease-out both' }}>
      {!question.subtitle && <Text size="xs" emphasis="faint" className="text-center -mt-1 mb-1">{hint}</Text>}
      {question.options.map(opt => (
        <VerifyToggle key={opt} label={opt} color={color} isOn={selected.includes(opt)} onToggle={() => toggle(opt)} />
      ))}
    </Stack>
  );
};

const VerifyHub = ({ isDark, subjects, evaluations, onSelect, onViewCompleted, onBack }) => {
  const c = COLOR_HEX.emerald;
  const [search, setSearch] = useState('');
  const [showAllCompleted, setShowAllCompleted] = useState(false);
  const [showAllPending, setShowAllPending] = useState(false);
  const PENDING_COLLAPSE = 3;

  const pending = subjects.filter(s => !evaluations[s.id])
    .sort((a, b) => {
      const avail = s => (s.availability ? [s.availability.video, s.availability.meet, s.availability.vouch].filter(Boolean).length : 0);
      return ((b.connections || 0) + avail(b) * 10) - ((a.connections || 0) + avail(a) * 10);
    });
  const completed = subjects.filter(s => !!evaluations[s.id]);
  const filtered = search.trim()
    ? subjects.filter(s => s.name.toLowerCase().includes(search.toLowerCase()) || s.city.toLowerCase().includes(search.toLowerCase()))

  const showList = filtered || (showAllPending ? pending : pending.slice(0, PENDING_COLLAPSE));

  return (
    <VerifyScreenLayout color="emerald" onBack={onBack}>
      <Text heading size="xl" weight="bold" className="mb-1">Verify</Text>
      {/* Stats bar */}
      {completedCount > 0 && (
        <div className="flex items-center gap-3 mb-3 px-3 py-1.5 rounded-full" style={{

          border: `1px solid rgba(${c.rgb}, 0.15)`,

          <Text size="xs" weight="medium" style={{ color: isDark ? c.light : c.base }}>
            {completedCount} evaluated
          </Text>
          <Text size="xs" emphasis="faint">·</Text>
          <Text size="xs" emphasis="faint">{pending.length} pending</Text>
        </div>
      )}
      {/* Search */}
      <div className="w-full relative mb-3">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"
          className="absolute left-3.5 top-1/2 -translate-y-1/2" style={{ color: isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)' }}>
          <circle cx="7" cy="7" r="5" /><path d="M11 11L14 14" />
        </svg>
        <input type="text" value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Search by name or city..."
          className="w-full h-11 rounded-xl pl-10 pr-4 text-sm font-medium outline-none transition-all duration-200"
          style={{
            background: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)',
            border: search ? `1px solid rgba(${c.rgb}, 0.3)` : (isDark ? '1px solid rgba(255,255,255,0.08)' : '1px solid rgba(0,0,0,0.08)'),
            color: isDark ? '#fff' : '#111',
          }} />
      </div>
      {/* Count */}
      <div className="w-full flex items-center justify-between mb-2">
        <Text size="xs" weight="medium" emphasis="faint">
          {filtered ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''}` : `${pending.length} pending`}
        </Text>
      </div>
      {/* Pending / search results */}
      <div className="w-full" style={{ animation: 'fadeSlideIn 0.4s ease-out both' }}>
        {!filtered && pending.length > 0 && (
          <button onClick={() => pending.length > PENDING_COLLAPSE && setShowAllPending(!showAllPending)}
            className="w-full flex items-center justify-between mb-2"
            style={{ cursor: pending.length > PENDING_COLLAPSE ? 'pointer' : 'default' }}>
            <Text size="xs" weight="semibold" emphasis="faint" className="uppercase tracking-wide">Up next</Text>
            {pending.length > PENDING_COLLAPSE && (
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                className={`transition-transform duration-200 ${showAllPending ? 'rotate-180' : ''}`}
                style={{ color: isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)' }}>
                <path d="M3 5L7 9L11 5" />

          </button>
        )}
        <Stack gap={2}>
          {showList.length === 0 && (
            <Placeholder icon={search ? '🔍' : '✅'} title={search ? 'No matches found' : 'All caught up!'} description={search ? 'Try a different name or city' : 'Check back for new evaluations'} />

          {showList.map(subject => (
            <VerifySubjectCard key={subject.id} subject={subject} isDone={!!evaluations[subject.id]}

        </Stack>
      </div>
      {/* Completed history */}
      {!filtered && completed.length > 0 && (
        <div className="mt-6 w-full">
          <button onClick={() => setShowAllCompleted(!showAllCompleted)}

              className={`transition-transform duration-200 ${showAllCompleted ? 'rotate-180' : ''}`}

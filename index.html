          </Text>
          <Stack gap={3} className="w-full">
            {[
              { key: 'A', label: 'I know them personally', sub: 'I can vouch for their identity', color: 'cyan', icon: '🤝' },
              { key: 'B', label: 'I met them for verification', sub: 'I investigated and have evidence', color: 'amber', icon: '🔍' },
              { key: 'C', label: "I'm reviewing their profile", sub: "Analyzing what's available", color: 'slate', icon: '📋' },
            ].map(opt => {
              const oc = COLOR_HEX[opt.color];
              const isSuggested = suggestedPath === opt.key;
              return (
                <button key={opt.key} onClick={() => {
                  setPath(opt.key);
                  setAnswers(prev => ({ ...prev, gate: opt.label }));
                  setPhase('path');
                  setQuestionIdx(0);
                  setAnimKey(k => k + 1);
                }}
                  className="w-full rounded-2xl px-4 py-3.5 text-left transition-all duration-200"
                  style={{
                    background: `linear-gradient(135deg, rgba(${oc.rgb}, 0.12), rgba(${oc.rgb}, 0.04))`,
                    border: isSuggested ? `1.5px solid rgba(${oc.rgb}, 0.4)` : `1px solid rgba(${oc.rgb}, 0.2)`,
                  }}>
                  <div className="flex items-center gap-3">
                    <span className="text-lg">{opt.icon}</span>
                    <div className="flex-1">
                      <Text size="sm" weight="semibold">{opt.label}</Text>
                      <Text size="xs" className="mt-0.5" style={{ color: isDark ? `rgba(${oc.rgb}, 0.7)` : oc.base + '99' }}>{opt.sub}</Text>
                    </div>
                    {isSuggested && (
                      <span className="text-xs px-2 py-0.5 rounded-full flex-shrink-0" style={{
                        background: `rgba(${oc.rgb}, 0.15)`, color: isDark ? oc.light : oc.base,
                      }}>Likely</span>
                    )}
                  </div>
                </button>
              );
            })}
          </Stack>
        </Stack>
      </VerifyScreenLayout>
    );
  }

  // Path questions
  const config = VERIFY_PATH_CONFIG[path];
  const color = config.color;
  const activePathQuestions = getActiveQuestions(path, answers);
  const question = activePathQuestions[questionIdx];

  if (!question) {
    onComplete({ path, pathLabel: config.label, answers });
    return null;
  }

  const handleAnswer = (val) => setAnswers(prev => ({ ...prev, [question.id]: val }));
  const advance = () => {
    setAnimKey(k => k + 1);
    // Validation checks
    if (question.type === 'star-confidence' && answers[question.id] === undefined) return;
    if (question.type === 'verdict' && !(answers[question.id]?.verdict && answers[question.id]?.confidence)) return;
    if (question.type === 'compact-connection') {
      const val = answers[question.id] || {};
      if (!question.fields.every(f => val[f.id])) return;
    }
    if (question.type === 'evidence-combined') {
      const val = answers[question.id] || {};
      if (!question.sections.some((_, si) => (val[`s${si}`] || []).length > 0)) return;
    }
    if (question.type === 'identity-check') {
      const val = answers[question.id] || {};
      if (!question.fields.every(f => val[f.id])) return;
    }
    const nextQuestions = getActiveQuestions(path, answers);
    const currentFilteredIdx = nextQuestions.findIndex(q => q.id === question.id);
    if (currentFilteredIdx + 1 < nextQuestions.length) setQuestionIdx(currentFilteredIdx + 1);
    else onComplete({ path, pathLabel: config.label, answers });
  };
  const goBack = () => {
    if (questionIdx > 0) { setAnimKey(k => k + 1); setQuestionIdx(questionIdx - 1); }
    else { setPhase('route'); setPath(null); setAnswers({}); }
  };
  const handleSingleAnswer = (val) => { handleAnswer(val); setTimeout(advance, 300); };

  const isSingle = question.type === 'single';
  const isMulti = question.type === 'multi';
  const isText = question.type === 'text';
  const isStar = question.type === 'star-confidence';
  const isVerdict = question.type === 'verdict';
  const isCompactConnection = question.type === 'compact-connection';
  const isEvidenceCombined = question.type === 'evidence-combined';
  const isIdentityCheck = question.type === 'identity-check';
  const needsContinueButton = isMulti || isText || isStar || isVerdict || isCompactConnection || isEvidenceCombined || isIdentityCheck;

  const continueDisabled = isText ? !(answers[question.id] || '').trim()
    : isMulti ? !(Array.isArray(answers[question.id]) ? answers[question.id].length : 0)
    : isStar ? answers[question.id] === undefined
    : isVerdict ? !(answers[question.id]?.verdict && answers[question.id]?.confidence)
    : isCompactConnection ? !question.fields.every(f => (answers[question.id] || {})[f.id])
    : isEvidenceCombined ? !question.sections.some((_, si) => ((answers[question.id] || {})[`s${si}`] || []).length > 0)
    : isIdentityCheck ? !question.fields.every(f => (answers[question.id] || {})[f.id])
    : false;

  // Progress counter for compact/identity fields
  // Field progress for compact-connection / identity-check
  const fieldVal = (isCompactConnection || isIdentityCheck) ? (answers[question.id] || {}) : null;
  const fieldTotal = fieldVal ? question.fields.length : 0;
  const fieldFilled = fieldVal ? question.fields.filter(f => fieldVal[f.id]).length : 0;
  const showFieldProgress = fieldVal && fieldFilled < fieldTotal;
  const fieldColor = colorOf(color);

  return (
    <VerifyScreenLayout color={color} subject={subject}
      sectionLabel={isVerdict ? 'Your Verdict' : config.label}
      progress={questionIdx} total={activePathQuestions.length} onBack={goBack}
      buttons={needsContinueButton ? (showFieldProgress ? (
        <div className="w-full h-14 rounded-2xl font-medium text-sm flex items-center justify-center transition-all duration-300"
          style={{
            background: isDark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.02)',
            border: isDark ? '1px solid rgba(255,255,255,0.06)' : '1px solid rgba(0,0,0,0.06)',
            color: isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)',
          }}>
          <span>Select one from each</span>
          <span className="ml-2 px-2 py-0.5 rounded-full text-xs font-semibold" style={{
            background: `rgba(${fieldColor.rgb}, 0.15)`, color: isDark ? fieldColor.light : fieldColor.base,
          }}>{fieldFilled} of {fieldTotal}</span>
        </div>
      ) : <VerifyActionButton label="Continue" color={color} onClick={advance} disabled={continueDisabled} />) : null}>
      <div key={`eq-${question.id}-${animKey}`} className="flex flex-col items-center gap-4 w-full mt-2" style={{ animation: 'fadeSlideIn 0.4s ease-out both' }}>
        {isVerdict && question.text.includes('\n') ? (<>
          <Text size="sm" weight="medium" emphasis="faint" className="uppercase tracking-wide">{question.text.split('\n')[0]}</Text>
          <Text heading size="lg" weight="semibold" className="text-center px-2 -mt-3">{question.text.split('\n')[1]}</Text>
        </>) : (
          <Text heading size="lg" weight="semibold" className="text-center px-2">{question.text}</Text>
        )}
        {question.subtitle && <Text size="xs" emphasis="faint" className="text-center -mt-2 px-4">{question.subtitle}</Text>}
        {isSingle && <VerifySingleSelect question={question} color={color} answer={answers[question.id]} onAnswer={handleSingleAnswer} />}
        {isMulti && <VerifyMultiToggle question={question} color={color} answer={answers[question.id]} onAnswer={handleAnswer} />}
        {isText && <VerifyTextInput question={question} color={color} answer={answers[question.id]} onAnswer={handleAnswer} onContinue={advance} />}
        {isStar && <VerifyStarConfidence color={color} value={answers[question.id]} onChange={handleAnswer} />}
        {isVerdict && <VerifyVerdict question={question} color={color} answer={answers[question.id]} onAnswer={handleAnswer} />}
        {(isCompactConnection || isIdentityCheck) && <VerifyFieldGroup question={question} color={color} answer={answers[question.id]} onAnswer={handleAnswer} />}
        {isEvidenceCombined && <VerifyEvidenceCombined question={question} color={color} answer={answers[question.id]} onAnswer={handleAnswer} />}
      </div>
    </VerifyScreenLayout>
  );
};

// ==================== VERIFY EVAL SUMMARY ====================

const VerifyEvalSummary = ({ isDark, data, subject, onSubmit, onBack, readOnly }) => {
  const { path, pathLabel, answers } = data;
  const config = VERIFY_PATH_CONFIG[path];
  const color = config.color;
  const c = COLOR_HEX[color];
  const verdictKey = config.questions.find(q => q.type === 'verdict')?.id;
  const verdictData = answers[verdictKey] || {};
  const verdict = verdictData.verdict;
  const isPositive = verdict === 'Yes';
  const confidence = verdictData.confidence || '--';
  const confLabels = { 1: 'Some confidence, notable gaps', 2: 'Fairly confident, minor uncertainty', 3: 'Very confident', 4: 'Certain' };
  const rows = config.questions.filter(q => answers[q.id] !== undefined && q.type !== 'verdict').flatMap(q => {
    const a = answers[q.id];
    if (q.type === 'compact-connection') return (q.fields || []).filter(f => a?.[f.id]).map(f => ({ label: f.label, value: a[f.id] }));
    if (q.type === 'evidence-combined') return (q.sections || []).map((s, si) => ({ label: s.label, value: (a?.[`s${si}`] || []).join(', ') || 'None' }));
    if (q.type === 'identity-check') return (q.fields || []).filter(f => a?.[f.id]).map(f => ({ label: f.label, value: a[f.id] }));
    return [{ label: q.text, value: Array.isArray(a) ? a.join(', ') : String(a) }];
  });

  return (
    <VerifyScreenLayout color={color} onBack={onBack}>
      <div className="w-full" style={{ animation: 'fadeSlideIn 0.4s ease-out both' }}>
        <div className="text-center mb-6">
          <div className="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium mb-2"
            style={{ background: `rgba(${c.rgb}, 0.12)`, color: isDark ? c.light : c.base, border: `1px solid rgba(${c.rgb}, 0.2)` }}>
            Path {path}: {pathLabel}
          </div>
          <Text heading size="xl" weight="bold" className="mt-2">Evaluation Summary</Text>
          {subject && <Text size="sm" emphasis="faint" className="mt-1">for {subject.name}</Text>}
        </div>
        {/* Verdict card */}
        <div className="rounded-2xl p-5 mb-4 text-center"
          style={{ background: `linear-gradient(135deg, rgba(${c.rgb}, 0.15), rgba(${c.rgb}, 0.05))`, border: `1px solid rgba(${c.rgb}, 0.25)` }}>
          {verdict && (
            <div className={`text-lg font-bold mb-3`} style={{ color: isPositive ? COLOR_HEX.emerald.light : COLOR_HEX.rose.light }}>
              {isPositive ? 'Yes' : 'No'}
            </div>
          )}
          <div className="flex justify-center gap-3 mb-3">
            {[1, 2, 3, 4].map(level => {
              const isSelected = typeof confidence === 'number' && level <= confidence;
              return (
                <div key={level} className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold"
                  style={{
                    background: isSelected ? `linear-gradient(135deg, rgba(${c.rgb}, 0.5), rgba(${c.rgb}, 0.25))` : (isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)'),
                    border: isSelected ? `1px solid rgba(${c.rgb}, 0.6)` : (isDark ? '1px solid rgba(255,255,255,0.1)' : '1px solid rgba(0,0,0,0.08)'),
                    color: isSelected ? '#fff' : (isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)'),
                  }}>
                  {level}
                </div>
              );
            })}
          </div>
          <Text size="xs" emphasis="faint">{confLabels[confidence] || 'Confidence'}</Text>
          {verdictData.flags && verdictData.flags.length > 0 && (
            <div className="flex flex-wrap gap-1.5 justify-center mt-3 pt-3" style={{ borderTop: isDark ? '1px solid rgba(255,255,255,0.06)' : '1px solid rgba(0,0,0,0.06)' }}>
              {verdictData.flags.map(f => (
                <span key={f} className="px-2.5 py-1 rounded-full text-xs font-medium"
                  style={{ background: `rgba(${COLOR_HEX.amber.rgb},${isDark ? 0.15 : 0.1})`, color: isDark ? COLOR_HEX.amber.light : COLOR_HEX.amber.base }}>
                  {f}
                </span>
              ))}
            </div>
          )}
        </div>
        {/* Responses */}
        <Card variant="plain" className="mb-4">
          <Text size="xs" weight="semibold" emphasis="faint" className="uppercase tracking-wider mb-4">Responses</Text>
          <div className="flex flex-col gap-4">
            {rows.map((row, i) => (
              <div key={i}>
                <Text size="xs" emphasis="faint" className="mb-1">{row.label}</Text>
                <Text size="sm">{row.value}</Text>
              </div>
            ))}
          </div>
        </Card>
        {answers['gate'] && (
          <Card variant="plain" className="mb-4">
            <Text size="xs" emphasis="faint" className="mb-1">Relationship</Text>
            <Text size="sm">{answers['gate']}</Text>
          </Card>
        )}
        {readOnly ? (
          <Text size="sm" emphasis="faint" className="text-center mb-6 px-4">
            Submitted {data.completedAt ? new Date(data.completedAt).toLocaleDateString() : ''}
          </Text>
        ) : (<>
          <Text size="xs" emphasis="faint" className="text-center mb-6 px-4">
            This evaluation will be weighted by your path ({pathLabel}), your confidence level, and your reputation in the network.
          </Text>
          <VerifyActionButton label="Submit Evaluation" color={color} onClick={onSubmit} />
          <div className="mt-3">
            <VerifyActionButton label="Start Over" color="gray" onClick={onBack} secondary />
          </div>
        </>)}
      </div>
    </VerifyScreenLayout>
  );
};

// — APP — Phase 2+3+4+5+8: Core Loop + Assessments + Profile/Analysis + Social/Settings + Verification
function App() {
  const { isDark, toggle: toggleTheme } = useTheme();
  const displayMode = useDisplayMode();
  const auth = useAuth();
  const cloudSync = useCloudSync();
  const responseCapture = useResponses();
  const compare = useCompare();
  const [questions] = useState(() => shuffleArray(QUESTIONS));
  const [screen, setScreenRaw] = useState(getInitialScreen);
  const [previousScreen, setPreviousScreen] = useState(null);
  // pushState routing — major screens push browser history
  const HISTORY_SCREENS = new Set(['landing', 'categories', 'settings', 'question', 'assess-picker', 'assess-results', 'clinical-consent', 'compare', 'public-profile', 'verify-hub', 'verify-eval-summary', 'profile', 'assess-analysis', 'history', 'identity']);
  const setScreen = useCallback((next) => {
    setScreenRaw(prev => {
      if (next !== prev && HISTORY_SCREENS.has(next)) {
        window.history.pushState({ screen: next }, '', '');
      }
      return next;
    });
  }, []);
  useEffect(() => {
    // Seed initial history entry
    window.history.replaceState({ screen }, '', '');
    const onPop = (e) => {
      const target = e.state?.screen;
      if (target) setScreenRaw(target);
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);
  // Storage state
  const stored = useRef(demoStorage.get());
  const [responses, setResponses] = useState(stored.current.answers);
  const [stats, setStats] = useState(stored.current.stats);
  const [entityType, setEntityType] = useState(stored.current.entityType || 'human');
  // Settings
  const [undoDelay, setUndoDelay] = useState(stored.current.settings?.undoDelay ?? 1);
  const [requireConfirmation, setRequireConfirmation] = useState(stored.current.settings?.requireConfirmation ?? true);
  const [showTips, setShowTips] = useState(stored.current.settings?.showTips ?? true);
  const [showStreak, setShowStreak] = useState(stored.current.settings?.showStreak ?? true);
  const mcColorMode = 'gray';
  // Question navigation
  const [currentIndex, setCurrentIndex] = useState(0);
  const [selectedTrack, setSelectedTrack] = useState(null);
  const [selectedSub, setSelectedSub] = useState(null);
  const [communityResults, setCommunityResults] = useState(() => generateDemoCommunityResults());
  const [sessionAnsweredIds] = useState(() => new Set());
  const [savedQuestions, setSavedQuestions] = useState(() => new Set(stored.current.saved || []));
  const recentQuestionIds = useRef(new Set());
  const [showGestureHint, setShowGestureHint] = useState(() => !localStorage.getItem('aura-hint-confidence-dismissed'));
  // Question meta (flags, explanations) — persisted so HistoryScreen can read them
  const [questionMeta, setQuestionMeta] = useState(() => {
    try { return JSON.parse(localStorage.getItem('aura-question-meta')) || {}; } catch { return {}; }
  });
  useEffect(() => { localStorage.setItem('aura-question-meta', JSON.stringify(questionMeta)); }, [questionMeta]);
  // QotD state
  const [qotdData] = useState(() => getRandomQOTD());
  const [qotdResponse, setQotdResponse] = useState(null);
  // Assessment hook
  const { assessState, assessActions, assessUI } = useAssessment({ setScreen, isDark, entityType, cloudSync, responseCapture });
  // Onboarding
  const [onboardingComplete, setOnboardingComplete] = useState(() => !!localStorage.getItem(ONBOARD_STORAGE_KEY));
  const [onboardingAnswers, setOnboardingAnswers] = useState(() => {
    try { return JSON.parse(localStorage.getItem(ONBOARD_STORAGE_KEY)) || {}; } catch { return {}; }
  });
  // Verification state
  const [verifyEvaluations, setVerifyEvaluations] = useState(() => verifyLoad()?.evaluations || {});
  const [verifyCurrentSubjectId, setVerifyCurrentSubjectId] = useState(null);
  const [verifyEvaluatorData, setVerifyEvaluatorData] = useState(null);
  const [verifyFlowPath, setVerifyFlowPath] = useState(null);
  const [verifyFlowAnswers, setVerifyFlowAnswers] = useState({});
  // Compare / Public Profile
  const [displayName, setDisplayName] = useState(() => localStorage.getItem('aura-display-name') || '');
  const [compareData, setCompareData] = useState(null);
  const [compareLoading, setCompareLoading] = useState(false);
  const [syncLoading, setSyncLoading] = useState(false);
  const [publicProfileId, setPublicProfileId] = useState(() => {
    try { return new URLSearchParams(window.location.search).get('p'); } catch { return null; }
  });
  // Sync display name from profile on auth
  useEffect(() => {
    if (auth.profile?.display_name && !displayName) {
      setDisplayName(auth.profile.display_name);
      localStorage.setItem('aura-display-name', auth.profile.display_name);
    }
  }, [auth.profile]);
  // Cloud sync on sign-in
  const syncDoneRef = useRef(false);
  useEffect(() => {
    if (auth.user && !auth.loading && !syncDoneRef.current) {
      syncDoneRef.current = true;
      setSyncLoading(true);
      cloudSync.syncOnLogin(assessState.assessCompleted, assessState.assessInProgress).then(merged => {
        if (merged) {
          assessState.setAssessCompleted(merged.completed);
          assessState.setAssessInProgress(merged.inProgress);
        }
        // Backfill any localStorage responses captured before sign-in
        responseCapture.backfillResponses(responses);
      }).finally(() => setSyncLoading(false));
    }
    if (!auth.user) syncDoneRef.current = false;
  }, [auth.user, auth.loading]);
  // Update profile summary when assessments change
  const prevCompletedCountRef = useRef(Object.keys(assessState.assessCompleted || {}).length);
  useEffect(() => {
    const count = Object.keys(assessState.assessCompleted || {}).length;
    if (auth.user && count !== prevCompletedCountRef.current) {
      prevCompletedCountRef.current = count;
      auth.updateProfileSummary(assessState.assessCompleted, auth.claims, entityType);
    }
  }, [assessState.assessCompleted, auth.user]);
  // Parse compare URL params on mount
  useEffect(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const shortId = params.get('c');
      const legacyCompare = params.get('compare');
      if (shortId) {
        setCompareLoading(true);
        compare.loadComparison(shortId).then(data => {
          setCompareData(data);
          setCompareLoading(false);
          if (data) setScreen('compare');
        });
      } else if (legacyCompare) {
        try {
          const data = JSON.parse(atob(legacyCompare));
          setCompareData({ traits: data.traits, name: data.name, entity: data.entity });
        } catch {}
      }
    } catch {}
  }, []);
  // Sign-out redirect — return to landing when user signs out
  const wasSignedInRef = useRef(!!auth.user);
  useEffect(() => {
    if (wasSignedInRef.current && !auth.user && !auth.loading) {
      setScreen('landing');
    }
    wasSignedInRef.current = !!auth.user;
  }, [auth.user, auth.loading]);

  // Sign-in nudge — show after 3+ completed assessments when not signed in
  const [showSignInNudge, setShowSignInNudge] = useState(false);
  const nudgeDismissedRef = useRef(false);
  useEffect(() => {
    const completedCount = Object.keys(assessState.assessCompleted || {}).length;
    if (completedCount >= 3 && !auth.user && !nudgeDismissedRef.current && !localStorage.getItem('aura-nudge-dismissed')) {
      setShowSignInNudge(true);
      setTimeout(() => setShowSignInNudge(false), 6000);
      nudgeDismissedRef.current = true;
      localStorage.setItem('aura-nudge-dismissed', '1');
    }
  }, [assessState.assessCompleted, auth.user]);
  // Toast (via context — replaces window.__auraToast)
  const { msg: globalToast } = useToast();
  // Dev panel
  const [showDevPanel, setShowDevPanel] = useState(IS_DEV);
  const [devMinimized, setDevMinimized] = useState(false);
  const [devPhoneSize, setDevPhoneSize] = useState('15pm');
  // Answer flow
  const mainFlow = useAnswerFlow({
    undoDelay,
    tapDelay: 400,
    graceEnabled: true,
    graceDuration: 1200,
    requireConfirmation,
    onPending: (answer, confidence) => {
      return { community: generateFakeResults(questions[currentIndex]), question: questions[currentIndex] };
    },
    onFinalize: (answer, confidence, extra) => {
      const q = questions[currentIndex];
      const newResponse = { answer, confidence, timestamp: Date.now() };
      const newResponses = { ...responses, [q.id]: newResponse };
      setResponses(newResponses);
      sessionAnsweredIds.add(q.id);
      if (extra?.community) setCommunityResults(prev => ({ ...prev, [q.id]: extra.community }));
      // Update stats
      const newStats = { ...stats, answered: Object.keys(newResponses).length };
      const today = new Date().toDateString();
      if (stats.lastAnswerDate === today) { newStats.streak = stats.streak; }
      else { const yesterday = new Date(Date.now() - 86400000).toDateString(); newStats.streak = stats.lastAnswerDate === yesterday ? stats.streak + 1 : 1; }
      newStats.lastAnswerDate = today;
      newStats.xp = (newStats.xp || 0) + XP_RATES.answer + (confidence >= 3 ? XP_RATES.highConfidence : 0);
      newStats.level = calculateLevel(newStats.xp);
      setStats(newStats);
      // Persist
      demoStorage.set({ answers: newResponses, skipped: [], saved: [...savedQuestions], viewed: [], settings: { darkMode: isDark, undoDelay, showStreak, requireConfirmation, showTips }, stats: newStats, entityType });
      // Cloud response capture (auth-gated, fire-and-forget)
      responseCapture.captureResponse(q.id, answer, confidence, {
        q: q.text, a: q.type === 'binary' ? (answer ? 'Yes' : 'No') : (q.options?.[answer] || String(answer)),
        t: q.type, c: q.category, v: q._v
      });
      // Advance to next
      setTimeout(() => {
        mainFlow.reset();
        const nextIdx = findNextUnanswered(currentIndex, newResponses);
        if (nextIdx !== null) setCurrentIndex(nextIdx);
      }, 100);
    },
  });
  const { tappedAnswer, tapCount, pendingSubmit, justUndone } = mainFlow;
  // Auto-dismiss confidence tip once they've multi-tapped
  useEffect(() => {
    if (tapCount >= 2 && showGestureHint) {
      setShowGestureHint(false);
      localStorage.setItem('aura-hint-confidence-dismissed', '1');
    }
  }, [tapCount]);
  // Auto-start quick-profile from onboarding bridge after delay (guard prevents double-fire)
  const bridgeStarted = useRef(false);
  const bridgeShownAt = useRef(0);
  const [bridgeFading, setBridgeFading] = useState(false);
  const launchFromBridge = useCallback(() => {
    if (bridgeStarted.current) return;
    bridgeStarted.current = true;
    setBridgeFading(true);
    setTimeout(() => { assessActions.assessStartTest(entityType === 'ai' ? 'ai-style' : 'quick-profile'); }, 350);
  }, [entityType]);
  useEffect(() => {
    if (screen !== 'onboarding-bridge') { bridgeStarted.current = false; setBridgeFading(false); return; }
    bridgeShownAt.current = Date.now();
    const t = setTimeout(launchFromBridge, 2500);
    return () => clearTimeout(t);
  }, [screen]);
  const handleBridgeTap = () => { if (Date.now() - bridgeShownAt.current < 1000) return; launchFromBridge(); };
  // Navigation helpers
  const findNextUnanswered = (fromIndex, resp = responses) => {
    const trackFilter = selectedTrack ? (q) => q.type === selectedTrack : () => true;
    const subFilter = selectedSub ? (q) => q.sub === selectedSub : () => true;
    const match = (q) => !resp[q.id] && trackFilter(q) && subFilter(q);
    const recent = recentQuestionIds.current;
    // Prefer non-recent questions first
    let fallback = null;
    for (let i = fromIndex + 1; i < questions.length; i++) { if (match(questions[i])) { if (!recent.has(questions[i].id)) return i; if (fallback === null) fallback = i; } }
    for (let i = 0; i < fromIndex; i++) { if (match(questions[i])) { if (!recent.has(questions[i].id)) return i; if (fallback === null) fallback = i; } }
    return fallback;
  };
  // Track recent questions, clear on track/sub change
  useEffect(() => {
    const q = questions[currentIndex];
    if (q) { recentQuestionIds.current.add(q.id); if (recentQuestionIds.current.size > 20) { const first = recentQuestionIds.current.values().next().value; recentQuestionIds.current.delete(first); } }
  }, [currentIndex]);
  useEffect(() => { recentQuestionIds.current.clear(); }, [selectedTrack, selectedSub]);
  const goToNext = () => {
    const next = findNextUnanswered(currentIndex);
    if (next !== null) { mainFlow.reset(); setCurrentIndex(next); }
    else if (currentIndex < questions.length - 1) { mainFlow.reset(); setCurrentIndex(currentIndex + 1); }
  };
  const goToPrev = () => { if (currentIndex > 0) { mainFlow.reset(); setCurrentIndex(currentIndex - 1); } };
  const skipQuestion = () => goToNext();
  const saveForLater = () => {
    const q = questions[currentIndex];
    setSavedQuestions(prev => { const s = new Set(prev); s.add(q.id); return s; });
  };

  // Current question derived state
  const currentQuestion = questions[currentIndex];
  const currentResponse = currentQuestion ? responses[currentQuestion.id] : null;
  const isAnswered = !!currentResponse;
  const isBinary = currentQuestion?.type === 'binary';
  const answeredCount = Object.keys(responses).length;
  const totalQuestions = questions.length;
  const showConfirmOverlay = tappedAnswer !== null && requireConfirmation && !isAnswered && !pendingSubmit;
  const confirmColor = isBinary
    ? COLOR_HEX[currentQuestion?.category === 'judgment' ? (tappedAnswer === 0 ? 'cyan' : 'violet') : (tappedAnswer === 0 ? 'emerald' : 'rose')]

    const flat = result.answers || result; // V2 or V1 format
    setOnboardingAnswers(flat);
    localStorage.setItem(ONBOARD_STORAGE_KEY, JSON.stringify(flat));
    setOnboardingComplete(true);

    if (result.keepGoing === false) {
      // "I'm good for now" → hub
      setScreen('assess-picker');
    } else if (result.path === 'reveal') {
      // "Go deeper" → bridge or direct to assessments
      if (!assessState.assessCompleted['quick-profile']) {
        setScreen('onboarding-bridge');
      } else {
        handleChooseReveal();
      }

      // "Explore questions" → hub
      setScreen('categories');

      setScreen('onboarding-bridge');
    } else {
      setScreen('path-choice');
    }
  };
  const handleChooseReveal = () => {
    if (!assessState.assessCompleted['quick-profile'] && entityType !== 'ai') {
      assessActions.assessStartTest('quick-profile');

      assessActions.assessStartTest('ai-style');

      setScreen('assess-picker');

  const handleSelectCategory = (categoryId) => {
    const catQ = categoryId === 'random' ? questions : questions.filter(q => q.category === categoryId);
    const unansweredBinary = catQ.filter(q => q.type === 'binary' && !responses[q.id]).length;
    const track = unansweredBinary > 0 ? 'binary' : 'multiple';
    setSelectedTrack(track);
    setSelectedSub(null);
    // Jump to first unanswered in this category
    const targetQ = catQ.find(q => !responses[q.id] && q.type === track);
    if (targetQ) {
      const idx = questions.indexOf(targetQ);
      if (idx >= 0) { mainFlow.reset(); setCurrentIndex(idx); }
    }
    setScreen('question');
  };
  // Assessment surprise — random incomplete test
  const handleAssessSurprise = () => {
    const incompleteTests = Object.keys(ASSESS_TESTS).filter(id => !assessState.assessCompleted[id]);
    if (incompleteTests.length > 0) {

  const goToSettings = () => { setPreviousScreen(screen); setScreen('settings'); };

    demoStorage.markReset();

    setResponses(getEmptyState().answers);
    setStats(getEmptyState().stats);
    setOnboardingComplete(false);
    setOnboardingAnswers({});
    setCommunityResults({});
    setVerifyEvaluations({});
    sessionAnsweredIds.clear();
    mainFlow.reset();
    setCurrentIndex(0);
    setScreen('landing');

  const resetVerification = () => {

      return <VerifyEvalSummary isDark={isDark} data={verifyEvaluatorData} subject={subj} readOnly
        onBack={() => { setVerifyEvaluatorData(null); setVerifyCurrentSubjectId(null); setScreen('verify-hub'); }} />;
    }
    // Default: Question Flow
    return <QuestionFlowScreen isDark={isDark}
      questionState={{ currentQuestion, currentIndex, questions, responses, communityResults, isAnswered, isBinary, answeredCount, totalQuestions, currentResponse, mcColorMode, sessionAnsweredIds, savedQuestions, selectedTrack, selectedSub, questionMeta, setQuestionMeta }}
      flowActions={{ setCommunityResults, handleUndo: mainFlow.handleUndo, goToPrev, goToNext, findNextUnanswered, setCurrentIndex: (i) => { mainFlow.reset(); setCurrentIndex(i); }, handleAnswerTap: mainFlow.handleTap, handleAnswerRightClick: mainFlow.handleRightClick, submitAnswer: mainFlow.submit, saveForLater, skipQuestion, clearUndoneState: mainFlow.clearUndone, setSelectedTrack, setSelectedSub }}
      uiState={{ pendingSubmit, undoDelay, justUndone, showTips, showGestureHint, setShowGestureHint, showConfirmOverlay, confirmColor, tappedAnswer, setTappedAnswer: mainFlow.setTappedAnswer, tapCount, setTapCount: mainFlow.setTapCount }} />;

    { id: 'path-choice', label: 'Path' }, { id: 'categories', label: 'Hub' }, { id: 'qotd', label: 'QotD' }, { id: 'question', label: 'Question' }, { id: 'settings', label: 'Settings' },

    { id: 'profile', label: 'Profile' }, { id: 'assess-analysis', label: 'Analysis' }, { id: 'history', label: 'History' },
    { id: 'compare', label: 'Compare' }, { id: 'public-profile', label: 'PubProf' },
    { id: 'verify-hub', label: 'Verify' }, { id: 'verify-evaluator', label: 'VEval' },

  const devPanelEl = IS_DEV && showDevPanel ? (() => {

    return (
      <div className={`fixed top-4 z-[10000] max-h-[92vh] overflow-y-auto rounded-xl border shadow-2xl ${bg}`} style={{ fontSize: '13px', width: '340px', left: '540px' }}>

          <div className="flex items-center" style={{ gap: '1px' }}>
            <button onClick={() => setEntityType('human')} className={`py-1 rounded-l font-medium cursor-pointer ${entityType === 'human' ? btnAccent : btnBase}`} style={{ width: '48px', textAlign: 'center', fontSize: '10px' }}>Human</button>
            <button onClick={() => setEntityType('ai')} className={`py-1 rounded-r font-medium cursor-pointer ${entityType === 'ai' ? 'bg-cyan-600 text-white' : btnBase}`} style={{ width: '32px', textAlign: 'center', fontSize: '10px' }}>AI</button>

        </div>
      </div>
    );
  }
  return (
    <div className="h-full flex flex-col overflow-hidden relative" style={{ background: 'var(--bg-main)' }}
      onClickCapture={(e) => { if (pendingSubmit) { e.stopPropagation(); mainFlow.handleUndo(); } }}>
      {settingsGearEl}
      <div className="flex-1 flex flex-col overflow-hidden">{renderContent()}</div>
      <div className="safe-bottom" />
      {nudgeEl}
      {globalToastEl}
      {syncOverlay}
      {devPanelEl}
    </div>
  );
}

// — MOUNT
ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary>
    <AuthProvider>
      <ToastProvider>
        <App />
      </ToastProvider>
    </AuthProvider>
  </ErrorBoundary>
);
  </script>
</body>
</html>
